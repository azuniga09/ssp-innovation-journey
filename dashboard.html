<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Facilitador · BWC Guatemala 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg:#0F0E1A; --surface:#1A1828; --surface2:#221F35;
  --jade:#4ECCA3; --orange:#FF6B35; --purple:#7C6FCD;
  --text:#E8E6F0; --muted:#8884A0; --border:rgba(255,255,255,0.08);
  --card:#1E1C2E;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* AUTH */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 50%,rgba(124,111,205,.08) 0%,transparent 60%),var(--bg);padding:2rem;}
.auth-card{max-width:400px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;text-align:center;}
.auth-logo{font-family:'Fraunces',serif;font-size:2rem;font-weight:900;color:var(--purple);margin-bottom:.25rem;}
.auth-logo span{color:var(--orange);}
.auth-sub{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:2rem;}
.auth-field{margin-bottom:1rem;text-align:left;}
.auth-field label{display:block;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--purple);margin-bottom:.4rem;}
.auth-field input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:.85rem 1rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;}
.auth-field input:focus{border-color:var(--purple);}
.auth-field input::placeholder{color:var(--muted);opacity:.5;}
.btn-auth{width:100%;padding:1rem;background:linear-gradient(135deg,var(--purple),#6058b0);border:none;border-radius:10px;color:#fff;font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:.5rem;}
.btn-auth:hover{opacity:.9;transform:translateY(-1px);}
.auth-error{display:none;background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);border-radius:8px;padding:.75rem;font-size:.82rem;color:var(--orange);margin-top:.75rem;}
.auth-error.visible{display:block;}

/* DASHBOARD */
#dashboard{display:none;}
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(15,14,26,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;z-index:100;}
.topbar-logo{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:900;color:var(--purple);}
.topbar-logo span{color:var(--orange);}
.topbar-right{display:flex;align-items:center;gap:1rem;}
.live-dot{width:8px;height:8px;background:#4ECCA3;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.live-label{font-size:.75rem;color:var(--jade);}
.last-update{font-size:.72rem;color:var(--muted);}
.btn-logout{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.75rem;padding:.3rem .6rem;cursor:pointer;}
.btn-logout:hover{border-color:var(--orange);color:var(--orange);}

.main{padding:5rem 1.5rem 2rem;}

/* STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;text-align:center;}
.stat-num{font-family:'Fraunces',serif;font-size:2rem;font-weight:900;line-height:1;}
.stat-num.jade{color:var(--jade);}
.stat-num.orange{color:var(--orange);}
.stat-num.purple{color:var(--purple);}
.stat-num.muted{color:var(--muted);}
.stat-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:.25rem;}

/* PROGRESS OVERVIEW */
.section-title{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}

/* PARTICIPANT CARDS */
.participants-grid{display:flex;flex-direction:column;gap:.75rem;}
.participant-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;transition:border-color .3s;}
.participant-card.completed{border-color:rgba(78,204,163,.3);}
.participant-card.active{border-color:rgba(124,111,205,.3);}
.participant-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.participant-email{font-size:.88rem;color:var(--text);font-weight:500;}
.participant-time{font-size:.72rem;color:var(--muted);}
.participant-badge{font-size:.65rem;padding:.2rem .6rem;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;}
.badge-completed{background:rgba(78,204,163,.15);color:var(--jade);}
.badge-active{background:rgba(124,111,205,.15);color:var(--purple);}
.badge-started{background:rgba(255,107,53,.1);color:var(--orange);}

/* STAGE PROGRESS */
.stage-progress{display:flex;gap:.3rem;align-items:center;margin-bottom:.75rem;}
.stage-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;border:1.5px solid var(--border);color:var(--muted);position:relative;}
.stage-dot.done{background:var(--jade);border-color:var(--jade);color:var(--bg);}
.stage-dot.current{border-color:var(--purple);color:var(--purple);background:rgba(124,111,205,.1);}
.stage-dot .dot-label{position:absolute;bottom:-16px;font-size:.55rem;color:var(--muted);white-space:nowrap;left:50%;transform:translateX(-50%);}
.stage-connector{flex:1;height:2px;background:var(--border);border-radius:1px;}
.stage-connector.done{background:var(--jade);}

/* INSIGHTS */
.participant-insight{font-size:.78rem;color:var(--muted);font-style:italic;line-height:1.5;padding:.6rem .8rem;background:var(--surface2);border-radius:8px;border-left:2px solid var(--purple);}
.insight-label{font-size:.65rem;color:var(--purple);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem;}

/* EMPTY */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:1rem;display:block;}

/* SEARCH */
.search-bar{display:flex;gap:.75rem;margin-bottom:1.25rem;}
.search-input{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:.7rem 1rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--purple);}
.search-input::placeholder{color:var(--muted);opacity:.5;}
.filter-btn{padding:.7rem 1rem;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--muted);font-size:.8rem;cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-btn.active{border-color:var(--jade);color:var(--jade);background:var(--jade-dim);}

@media(max-width:600px){
  .stats-bar{grid-template-columns:repeat(2,1fr);}
  .stage-dot .dot-label{display:none;}
  .main{padding:4.5rem 1rem 1.5rem;}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">SSP<span>.</span></div>
    <div class="auth-sub">Dashboard Facilitador · BWC 2026</div>
    <div class="auth-field">
      <label>Código de facilitador</label>
      <input type="password" id="auth-code" placeholder="Código del facilitador">
    </div>
    <button class="btn-auth" id="btn-auth">Acceder al Dashboard</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">SSP<span>.</span> <span style="font-size:.8rem;font-weight:300;color:var(--muted)">Facilitador</span></div>
    <div class="topbar-right">
      <span class="live-dot"></span>
      <span class="live-label">En vivo</span>
      <span class="last-update" id="last-update"></span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="main">
    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-num jade" id="stat-total">0</div><div class="stat-label">Participantes</div></div>
      <div class="stat-card"><div class="stat-num orange" id="stat-active">0</div><div class="stat-label">En proceso</div></div>
      <div class="stat-card"><div class="stat-num purple" id="stat-completed">0</div><div class="stat-label">Completados</div></div>
      <div class="stat-card"><div class="stat-num muted" id="stat-avg">0</div><div class="stat-label">Etapa promedio</div></div>
    </div>

    <!-- Search & Filter -->
    <div class="search-bar">
      <input class="search-input" id="search-input" placeholder="Buscar por email..." oninput="renderParticipants()">
      <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">Todos</button>
      <button class="filter-btn" id="filter-active" onclick="setFilter('active')">En proceso</button>
      <button class="filter-btn" id="filter-done" onclick="setFilter('done')">Completados</button>
    </div>

    <div class="section-title" id="participants-count">Cargando participantes...</div>
    <div class="participants-grid" id="participants-grid"></div>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyA3C75IlZRYlry0CVyH2kkyVSbCHc-K6T0",
  authDomain: "smart-serious-play-test.firebaseapp.com",
  databaseURL: "https://smart-serious-play-test-default-rtdb.firebaseio.com",
  projectId: "smart-serious-play-test",
  storageBucket: "smart-serious-play-test.firebasestorage.app",
  messagingSenderId: "197500322718",
  appId: "1:197500322718:web:8ebe4ec27be1fbc8d10c8f"
});
const DB = firebase.database();

const FACILITADOR_CODE = 'FACILITADOR2026';
const STAGE_NAMES = ['Producto','Seg. Lógico','Seg. Revelado','Historia','Modelo Causal','Factor WOW'];

let allData = {};
let currentFilter = 'all';

// ── AUTH ──
document.getElementById('btn-auth').addEventListener('click', doAuth);
document.getElementById('auth-code').addEventListener('keydown', e => { if(e.key==='Enter') doAuth(); });

function doAuth() {
  const code = document.getElementById('auth-code').value.trim().toUpperCase();
  const err = document.getElementById('auth-error');
  err.classList.remove('visible');
  if (code !== FACILITADOR_CODE) {
    err.textContent = 'Código incorrecto.';
    err.classList.add('visible'); return;
  }
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  startListening();
}

function doLogout() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('auth-code').value = '';
}

// ── FIREBASE LISTENER ──
function startListening() {
  DB.ref('bwc2026').on('value', snap => {
    allData = snap.exists() ? snap.val() : {};
    updateStats();
    renderParticipants();
    document.getElementById('last-update').textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
  });
}

// ── STATS ──
function updateStats() {
  const participants = Object.values(allData);
  const total = participants.length;
  const completed = participants.filter(p => {
    const stages = p.stages || {};
    return Object.values(stages).filter(s => s.completed).length === 6;
  }).length;
  const active = total - completed;
  const avgStage = total > 0
    ? Math.round(participants.reduce((sum, p) => {
        const stages = p.stages || {};
        return sum + Object.values(stages).filter(s => s.completed).length;
      }, 0) / total)
    : 0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-completed').textContent = completed;
  document.getElementById('stat-avg').textContent = avgStage;
}

// ── RENDER ──
function setFilter(f) {
  currentFilter = f;
  ['all','active','done'].forEach(x => {
    document.getElementById('filter-'+x).classList.toggle('active', x===f);
  });
  renderParticipants();
}

function renderParticipants() {
  const search = document.getElementById('search-input').value.toLowerCase();
  let participants = Object.entries(allData).map(([key, data]) => ({
    key, email: data.email || key.replace(/_at_/g,'@').replace(/_/g,'.'),
    stages: data.stages || {},
    currentStage: data.currentStage || 0,
    updatedAt: data.updatedAt || 0
  }));

  // Filter
  participants = participants.filter(p => {
    const completedCount = Object.values(p.stages).filter(s => s.completed).length;
    const isComplete = completedCount === 6;
    if (currentFilter === 'done' && !isComplete) return false;
    if (currentFilter === 'active' && isComplete) return false;
    if (search && !p.email.toLowerCase().includes(search)) return false;
    return true;
  });

  // Sort by last update
  participants.sort((a,b) => b.updatedAt - a.updatedAt);

  document.getElementById('participants-count').textContent =
    participants.length + ' participante' + (participants.length !== 1 ? 's' : '');

  const grid = document.getElementById('participants-grid');
  if (participants.length === 0) {
    grid.innerHTML = '<div class="empty-state"><span class="empty-icon">🎮</span><div>No hay participantes aún</div><div style="font-size:.8rem;margin-top:.5rem">Cuando los emprendedores entren con BWC2026 aparecerán aquí</div></div>';
    return;
  }

  grid.innerHTML = participants.map(p => {
    const completedCount = Object.values(p.stages).filter(s => s.completed).length;
    const isComplete = completedCount === 6;
    const timeAgo = getTimeAgo(p.updatedAt);

    // Stage dots
    const dots = STAGE_NAMES.map((name, i) => {
      const done = p.stages['_stage'+i]?.completed ||
        [['producto','segmento_logico','segmento_revelado','historia','modelo_causal','factor_wow'][i]]
        .map(id => p.stages[id]?.completed).some(Boolean);
      const isCurrent = !done && i === completedCount;
      return (i > 0 ? '<div class="stage-connector ' + (done?'done':'') + '"></div>' : '') +
        '<div class="stage-dot ' + (done?'done':isCurrent?'current':'') + '">' +
        (done ? '✓' : i+1) +
        '<span class="dot-label">' + name + '</span></div>';
    }).join('');

    // Get insight if available
    const revelacion = p.stages?.segmento_revelado?.revelacion || '';
    const insightHtml = revelacion
      ? '<div class="participant-insight"><div class="insight-label">🎯 Segmento revelado</div>' + revelacion.substring(0, 120) + (revelacion.length > 120 ? '...' : '') + '</div>'
      : '';

    const badgeClass = isComplete ? 'badge-completed' : completedCount > 0 ? 'badge-active' : 'badge-started';
    const badgeText = isComplete ? '✓ Completado' : completedCount > 0 ? 'Etapa ' + (completedCount+1) : 'Iniciando';

    return '<div class="participant-card ' + (isComplete?'completed':completedCount>0?'active':'') + '">' +
      '<div class="participant-header">' +
      '<span class="participant-email">' + p.email + '</span>' +
      '<div style="display:flex;align-items:center;gap:.5rem">' +
      '<span class="participant-time">' + timeAgo + '</span>' +
      '<span class="participant-badge ' + badgeClass + '">' + badgeText + '</span>' +
      '</div></div>' +
      '<div class="stage-progress" style="margin-bottom:.6rem">' + dots + '</div>' +
      insightHtml +
      '</div>';
  }).join('');
}

function getTimeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const min = Math.floor(diff/60000);
  if (min < 1) return 'ahora mismo';
  if (min < 60) return 'hace ' + min + ' min';
  const hrs = Math.floor(min/60);
  if (hrs < 24) return 'hace ' + hrs + 'h';
  return 'hace ' + Math.floor(hrs/24) + 'd';
}
</script>
</body>
</html>
