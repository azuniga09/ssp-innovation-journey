<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSP Innovation Journey · Guatemala</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0F0E1A; --surface:#1A1828; --surface2:#221F35; --jade:#4ECCA3;
  --jade-dim:rgba(78,204,163,0.15); --orange:#FF6B35; --orange-dim:rgba(255,107,53,0.15);
  --purple:#7C6FCD; --text:#E8E6F0; --muted:#8884A0; --border:rgba(255,255,255,0.08);
  --card-bg:#1E1C2E;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(15,14,26,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;z-index:100;}
.topbar-logo{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:900;color:var(--jade);letter-spacing:-1px;}
.topbar-logo span{color:var(--orange);}
.topbar-right{display:flex;align-items:center;gap:.75rem;}
.topbar-name{font-size:.85rem;color:var(--muted);}
.btn-reset{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.75rem;padding:.3rem .6rem;cursor:pointer;transition:all .2s;}
.btn-reset:hover{border-color:var(--orange);color:var(--orange);}

.app-layout{display:flex;padding-top:56px;min-height:100vh;}

.sidebar{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  padding:1.5rem 1rem;position:fixed;top:56px;left:0;bottom:0;overflow-y:auto;}
.sidebar-title{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:1.25rem;padding-left:.5rem;}
.stage-item{display:flex;align-items:flex-start;gap:.75rem;padding:.65rem .75rem;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:.25rem;}
.stage-item.active{background:var(--jade-dim);}
.stage-item.completed{opacity:.7;}
.stage-item:hover:not(.active){background:rgba(255,255,255,.04);}
.stage-num{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;color:var(--muted);flex-shrink:0;transition:all .2s;}
.stage-item.active .stage-num{border-color:var(--jade);color:var(--jade);background:var(--jade-dim);}
.stage-item.completed .stage-num{border-color:var(--jade);background:var(--jade);color:var(--bg);}
.stage-label{font-size:.8rem;line-height:1.3;color:var(--muted);}
.stage-item.active .stage-label{color:var(--text);}

.main{margin-left:260px;flex:1;padding:2.5rem 2rem;max-width:820px;}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:2rem;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--jade),var(--purple));border-radius:2px;transition:width .4s ease;}

.stage-card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:2rem;margin-bottom:1.5rem;position:relative;overflow:hidden;}
.stage-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--jade),var(--purple));}
.stage-eyebrow{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--jade);margin-bottom:.5rem;}
.stage-title{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:600;color:var(--text);margin-bottom:.5rem;line-height:1.2;}
.stage-prompt{color:var(--muted);font-size:.9rem;line-height:1.6;margin-bottom:1.5rem;}

.field-group{margin-bottom:1.25rem;}
.field-label{font-size:.75rem;color:var(--jade);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem;display:block;}
.field-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:.85rem 1rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;resize:none;}
.field-input:focus{border-color:var(--jade);}
.field-input::placeholder{color:var(--muted);opacity:.5;}

.photo-zone{border:2px dashed var(--border);border-radius:12px;padding:2rem;text-align:center;margin-bottom:1.25rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.photo-zone:hover{border-color:var(--jade);background:var(--jade-dim);}
.photo-zone.has-image{border-style:solid;border-color:var(--jade);padding:0;}
.photo-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:2;}
.photo-preview{width:100%;max-height:280px;object-fit:contain;border-radius:10px;display:none;}
.photo-preview.visible{display:block;}
.photo-placeholder{color:var(--muted);font-size:.9rem;pointer-events:none;}
.photo-placeholder .icon{font-size:2.5rem;margin-bottom:.5rem;display:block;}
.photo-zone.has-image .photo-placeholder{display:none;}
.photo-change{font-size:.72rem;color:var(--jade);margin-top:.35rem;display:none;padding:.5rem;}
.photo-zone.has-image .photo-change{display:block;}

.btn-ai{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--jade),#38b590);border:none;border-radius:10px;color:var(--bg);font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:.75rem;}
.btn-ai:hover{opacity:.9;transform:translateY(-1px);}
.btn-ai:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-save{background:linear-gradient(135deg,var(--purple),#6058b0);}
.btn-confirm{background:linear-gradient(135deg,var(--orange),#e55a2a);}

.btn-regenerate{width:100%;padding:.7rem;background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:.85rem;cursor:pointer;transition:all .2s;display:none;margin-bottom:.75rem;}
.btn-regenerate.visible{display:block;}
.btn-regenerate:hover{border-color:var(--jade);color:var(--jade);}

.ai-result{display:none;margin-top:1.25rem;}
.ai-result.visible{display:block;}
.ai-result-box{background:var(--orange-dim);border:1px solid rgba(255,107,53,.3);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.ai-result-eyebrow{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--orange);margin-bottom:.75rem;}
.ai-result-text{font-family:'Fraunces',serif;font-size:1rem;font-weight:300;line-height:1.7;color:var(--text);white-space:pre-wrap;}

.segment-selector{margin-top:1rem;}
.segment-label{font-size:.75rem;color:var(--jade);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.75rem;display:block;}
.segment-options{display:flex;flex-direction:column;gap:.5rem;}
.segment-option{padding:1rem;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;font-size:.88rem;line-height:1.5;}
.segment-option:hover{border-color:var(--jade);}
.segment-option.selected{border-color:var(--jade);background:var(--jade-dim);}
.segment-option-label{font-size:.7rem;color:var(--orange);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.35rem;font-weight:600;}
.segment-message{margin-top:.5rem;font-size:.82rem;color:var(--orange);font-style:italic;}

.accionadores-grid{display:flex;flex-direction:column;gap:.6rem;margin-top:1rem;}
.accionador-item{padding:.9rem 1rem;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;}
.accionador-item:hover{border-color:var(--purple);}
.accionador-item.selected{border-color:var(--jade);background:var(--jade-dim);}
.accionador-tipo{font-size:.68rem;color:var(--orange);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.2rem;font-weight:600;}
.accionador-nombre{font-size:.85rem;color:var(--text);font-weight:600;margin-bottom:.2rem;}
.accionador-insight{font-size:.78rem;color:var(--muted);margin-bottom:.3rem;font-style:italic;}
.accionador-accion{font-size:.85rem;color:var(--jade);}
.selection-count{font-size:.78rem;color:var(--muted);margin-top:.75rem;text-align:right;}
.selection-count span{color:var(--jade);font-weight:600;}

.wow-options{display:flex;flex-direction:column;gap:.75rem;margin-top:1rem;}
.wow-card{padding:1.25rem;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);}
.wow-card.funcional{border-color:rgba(78,204,163,.4);}
.wow-card.emocional{border-color:rgba(124,111,205,.4);}
.wow-card.simbolico{border-color:rgba(255,107,53,.4);}
.wow-type{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.5rem;font-weight:600;}
.wow-card.funcional .wow-type{color:var(--jade);}
.wow-card.emocional .wow-type{color:var(--purple);}
.wow-card.simbolico .wow-type{color:var(--orange);}
.wow-text{font-size:.9rem;line-height:1.6;color:var(--text);margin-bottom:.5rem;}
.wow-moment{font-family:'Fraunces',serif;font-style:italic;font-size:.95rem;color:var(--muted);}

.accepted-box{display:none;background:rgba(78,204,163,.06);border:1px solid rgba(78,204,163,.2);border-radius:10px;padding:1rem 1.25rem;margin-top:1rem;}
.accepted-box.visible{display:block;}
.accepted-label{font-size:.7rem;color:var(--jade);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.35rem;}
.accepted-text{font-size:.88rem;color:var(--text);line-height:1.5;white-space:pre-wrap;}

.stage-nav{display:flex;justify-content:space-between;margin-top:1.5rem;}
.btn-nav{padding:.7rem 1.4rem;border-radius:8px;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;}
.btn-prev{background:none;border:1px solid var(--border);color:var(--muted);}
.btn-prev:hover{border-color:var(--muted);color:var(--text);}
.btn-next{background:var(--jade);border:none;color:var(--bg);font-weight:600;}
.btn-next:hover{opacity:.85;}
.btn-next:disabled{opacity:.3;cursor:not-allowed;}

.summary-card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:2rem;margin-bottom:1rem;}
.summary-title{font-family:'Fraunces',serif;font-size:2rem;font-weight:900;color:var(--jade);margin-bottom:.25rem;}
.summary-subtitle{color:var(--muted);font-size:.85rem;margin-bottom:2rem;}
.summary-item{padding:1rem 0;border-bottom:1px solid var(--border);}
.summary-item:last-child{border-bottom:none;}
.summary-stage-name{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--jade);margin-bottom:.35rem;}
.summary-content{font-size:.9rem;color:var(--text);line-height:1.5;white-space:pre-wrap;}
.btn-download{width:100%;padding:1rem;background:linear-gradient(135deg,var(--orange),#e55a2a);border:none;border-radius:10px;color:white;font-size:.95rem;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:1rem;}
.btn-download:hover{opacity:.88;}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:#0F0E1A;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface2);border:1px solid var(--jade);color:var(--jade);padding:.75rem 1.25rem;border-radius:8px;font-size:.85rem;z-index:999;transform:translateY(100px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
@media(max-width:700px){.sidebar{display:none;}.main{margin-left:0;padding:1.25rem;}}

/* ── JUEGO STAGE ── */
.juego-container { display: flex; flex-direction: column; gap: 1.25rem; }
.juego-turno { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 12px; padding: 1.25rem; transition: all .2s; }
.juego-turno.active { border-color: var(--jade); background: var(--jade-dim); }
.juego-turno.done { border-color: rgba(78,204,163,.3); opacity: .85; }
.juego-turno.ia-turno { border-color: rgba(124,111,205,.3); background: rgba(124,111,205,.06); }
.juego-turno.ia-turno.active { border-color: var(--purple); background: rgba(124,111,205,.12); }
.turno-header { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
.turno-badge { font-size: .68rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; padding: .25rem .6rem; border-radius: 20px; }
.turno-badge.emprendedor { background: var(--jade-dim); color: var(--jade); }
.turno-badge.ia { background: rgba(124,111,205,.2); color: var(--purple); }
.turno-title { font-size: .9rem; font-weight: 600; color: var(--text); }
.turno-subtitle { font-size: .78rem; color: var(--muted); margin-top: .15rem; }

/* Card picker for juego */
.juego-cards-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: .4rem; max-height: 260px; overflow-y: auto; margin-bottom: .75rem; }
.juego-card { aspect-ratio: 3/4; border-radius: 7px; border: 2px solid var(--border); cursor: pointer; overflow: hidden; transition: all .15s; background: var(--surface2); }
.juego-card:hover { border-color: var(--jade); transform: scale(1.03); }
.juego-card.selected { border-color: var(--jade); box-shadow: 0 0 0 2px var(--jade); }
.juego-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* Selected card display */
.selected-card-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
.selected-card-mini { width: 36px; height: 48px; border-radius: 5px; overflow: hidden; flex-shrink: 0; border: 1.5px solid var(--jade); }
.selected-card-mini img { width: 100%; height: 100%; object-fit: cover; }

/* IA card reveal */
.ia-card-reveal { display: flex; align-items: center; gap: 1rem; padding: .75rem; background: rgba(124,111,205,.1); border-radius: 10px; margin-bottom: .75rem; }
.ia-card-img { width: 48px; height: 64px; border-radius: 6px; overflow: hidden; border: 2px solid var(--purple); flex-shrink: 0; }
.ia-card-img img { width: 100%; height: 100%; object-fit: cover; }
.ia-card-text { font-size: .85rem; color: var(--text); line-height: 1.5; }
.ia-story-fragment { font-family: 'Fraunces', serif; font-size: .95rem; font-style: italic; line-height: 1.7; color: var(--text); margin-top: .5rem; padding: .75rem; background: rgba(124,111,205,.08); border-radius: 8px; border-left: 3px solid var(--purple); }

.juego-metaphor { width: 100%; background: none; border: none; outline: none; color: var(--text); font-family: 'Fraunces', serif; font-size: 1rem; font-style: italic; line-height: 1.6; resize: none; min-height: 60px; }
.juego-metaphor::placeholder { color: var(--muted); opacity: .5; }

.btn-juego { padding: .7rem 1.25rem; border-radius: 8px; font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .15s; border: none; }
.btn-juego-primary { background: var(--jade); color: var(--bg); }
.btn-juego-primary:hover { opacity: .85; }
.btn-juego-primary:disabled { opacity: .3; cursor: not-allowed; }
.btn-juego-ia { background: var(--purple); color: white; }
.btn-juego-ia:hover { opacity: .85; }
.btn-juego-ia:disabled { opacity: .3; cursor: not-allowed; }

.juego-progress { display: flex; gap: .4rem; margin-bottom: 1.25rem; }
.juego-step { flex: 1; height: 4px; border-radius: 2px; background: var(--border); transition: background .3s; }
.juego-step.done { background: var(--jade); }
.juego-step.active { background: var(--purple); }
.juego-step.ia { background: rgba(124,111,205,.4); }

</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">SSP<span>.</span> <span style="font-size:.8rem;font-weight:300;color:var(--muted);letter-spacing:.1em">Innovation Journey</span></div>
  <div class="topbar-right">
    <span class="topbar-name">Guatemala 2025</span>
    <button class="btn-reset" onclick="resetJourney()">↺ Reiniciar</button>
  </div>
</div>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-title">Tu Journey</div>
    <div id="stage-nav-list"></div>
  </aside>
  <main class="main">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div id="stage-view"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const STAGES = [
  {
    id:'producto', num:1, title:'Descripción del Producto', mode:'texto',
    prompt:'Describe tu producto o servicio. ¿Qué es, qué hace, cómo funciona? Sé específico — esta información alimentará todo tu proceso de innovación.',
    fields:[
      {key:'nombre', label:'Nombre de tu producto o servicio', placeholder:'Ej: Plataforma de gestión para restaurantes...', rows:2},
      {key:'descripcion', label:'¿Qué hace y cómo funciona?', placeholder:'Describe en detalle qué problema resuelve y cómo lo resuelve...', rows:4},
      {key:'diferencia', label:'¿Qué lo hace diferente a lo que ya existe?', placeholder:'Tu ventaja o característica única...', rows:3},
    ]
  },
  {
    id:'segmento_logico', num:2, title:'Segmento de Mercado Lógico', mode:'texto',
    prompt:'¿A quién crees que va dirigido tu producto? Describe a ese cliente "obvio" — el que todos esperarían que te comprara.',
    fields:[
      {key:'quien', label:'¿Quién es tu cliente lógico?', placeholder:'Describe a esa persona: qué hace, dónde está, qué necesita...', rows:3},
      {key:'necesidad', label:'¿Cuál es su necesidad obvia?', placeholder:'El problema evidente que tu producto resuelve para ellos...', rows:3},
      {key:'porque', label:'¿Por qué crees que te compraría?', placeholder:'La razón lógica por la que elegiría tu producto...', rows:3},
    ]
  },
  {
    id:'segmento_revelado', num:3, title:'Segmento de Mercado Revelado', mode:'foto_ia',
    prompt:'Elige una o varias cartas SSP que evoquen a tu cliente real. Fotografía las cartas y responde las preguntas — la IA descubrirá tu segmento revelado.',
    photoLabel:'📸 Sube la foto de tus cartas SSP elegidas',
    questions:[
      {key:'q1', label:'¿Qué hace tu cliente en su día a día?', placeholder:'Describe su rutina, contexto, entorno...', rows:2},
      {key:'q2', label:'¿Qué emoción vive frecuentemente con el problema que resuelves?', placeholder:'Ansiedad, frustración, esperanza, confusión...', rows:2},
      {key:'q3', label:'¿Qué ha intentado antes y no le ha funcionado?', placeholder:'Soluciones anteriores que no resolvieron su problema...', rows:2},
      {key:'q4', label:'¿Qué cambio desea lograr si tu producto realmente funciona?', placeholder:'El sueño que tiene, la transformación que busca...', rows:2},
    ],
    aiButton:'✦ Descubrir mi Segmento Revelado',
    outputMode:'segmentos'
  },
  {
    id:'historia', num:4, title:'Historia Colaborativa → Dolores, Insights y Accionadores', mode:'juego',
    prompt:'Co-crea una historia fantástica con la IA usando cartas SSP. Tú eliges 3 cartas, la IA elige 2 cartas aleatorias. Juntos construyen la historia de tu cliente.',
    aiButton:'✦ Generar Historia y Mapa Emocional',
    outputMode:'accionadores'
  },
  {
    id:'modelo_causal', num:5, title:'Modelo Causal', mode:'texto',
    prompt:'Con la matriz que te dio el facilitador, analiza las conexiones entre tus 6 insights y accionadores. ¿Cuál tiene mayor grado de causalidad con los demás?',
    fields:[
      {key:'ganador', label:'¿Cuál es el accionador con mayor conectividad?', placeholder:'Escribe aquí el accionador ganador de tu modelo causal...', rows:3},
      {key:'razon', label:'¿Por qué tiene más conexiones que los demás?', placeholder:'Explica brevemente por qué este accionador impacta a más insights...', rows:3},
    ]
  },
  {
    id:'factor_wow', num:6, title:'Propuesta de Valor y Factor WOW', mode:'solo_ia',
    prompt:'Con todo tu proceso construido, la IA generará tu Propuesta de Valor y tu Factor WOW — ese elemento único e irrepetible que hará que tus clientes digan ¡WOW!',
    aiButton:'✦ Generar mi Propuesta de Valor y Factor WOW',
    outputMode:'wow'
  },
];

let currentStage = 0;
let journeyData = JSON.parse(localStorage.getItem('ssp_journey') || '{}');
let photoBase64 = {};

function saveLocal() {
  const toSave = {};
  Object.keys(journeyData).forEach(k => {
    toSave[k] = {...journeyData[k]};
    delete toSave[k].photoThumb; // thumbnails son muy grandes para localStorage
  });
  try { localStorage.setItem('ssp_journey', JSON.stringify(toSave)); } catch(e) {}
}

window.resetJourney = () => {
  if (!confirm('¿Reiniciar todo el proceso? Se perderán tus respuestas.')) return;
  localStorage.removeItem('ssp_journey');
  journeyData = {};
  photoBase64 = {};
  currentStage = 0;
  renderSidebar();
  renderStage(0);
};

// ── SIDEBAR ──
function renderSidebar() {
  const nav = document.getElementById('stage-nav-list');
  const allDone = STAGES.every(s => journeyData[s.id]?.completed);
  nav.innerHTML = STAGES.map((s, i) => {
    const done = journeyData[s.id]?.completed;
    const active = i === currentStage;
    return `<div class="stage-item ${active?'active':''} ${done&&!active?'completed':''}" onclick="goToStage(${i})">
      <div class="stage-num">${done&&!active?'✓':i+1}</div>
      <div class="stage-label">${s.title}</div>
    </div>`;
  }).join('') + (allDone ? `
    <div class="stage-item" onclick="showSummary()" style="margin-top:.5rem">
      <div class="stage-num" style="border-color:var(--orange);color:var(--orange)">★</div>
      <div class="stage-label" style="color:var(--orange)">Ver mi Proceso Completo</div>
    </div>` : '');
}

window.goToStage = (i) => { currentStage = i; renderSidebar(); renderStage(i); };

// ── RENDER STAGE ──
function renderStage(idx) {
  if (idx >= STAGES.length) { showSummary(); return; }
  const stage = STAGES[idx];

function initPhoto(stage, saved) {
  const input = document.getElementById(`photo-input-${stage.id}`);

  input.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const b64full = ev.target.result;
      photoBase64[stage.id] = b64full.split(',')[1];
      if (!journeyData[stage.id]) journeyData[stage.id] = {};
      journeyData[stage.id].photoThumb = b64full;

  {id:63, f:"https://drive.google.com/uc?export=view&id=1em-Q1a35VWeSmcXHVuVa0itiK9WnWVLR", r:"https://drive.google.com/uc?export=view&id=17fNlwSqAFcNtWvJZyfD7JzYtQeWKKkT8", desc:"Monja frente a iglesia en ambiente espiritual con jardines. Representa devoción, servicio y encontrar paz en la fe."},
  {id:64, f:"https://drive.google.com/uc?export=view&id=1ucUhsD8krgUspZnpmzks4Lw0QOJYMSg6", r:"https://drive.google.com/uc?export=view&id=1bUhvW42QVJe7F2MWRDeig_Fc0H3tNCRT", desc:"Hombre Araña en edificio con rascacielos nocturnos. Representa doble identidad, responsabilidad con gran poder y proteger en silencio."},
  {id:65, f:"https://drive.google.com/uc?export=view&id=15kMAvfb6Q1apDjvhnI0XCO7fHuYWxFE3", r:"https://drive.google.com/uc?export=view&id=1G-XQ2awJSvSFt1cJnf1ImrvRh6R1qza3", desc:"Minifigura pintando en caballete en estudio de arte. Representa expresión creativa, proceso artístico y transformar el mundo con color."},
  {id:66, f:"https://drive.google.com/uc?export=view&id=1Mmt-7MRAw7eKV5AtUPCvI9OxHZfvBy7f", r:"https://drive.google.com/uc?export=view&id=1MlZOplHt3ZOcvBlF82Z0Vs3drGWM-hg5", desc:"Globo aerostático vibrante sobre campos al amanecer. Representa elevación, perspectiva desde arriba y libertad de volar."},
  {id:67, f:"https://drive.google.com/uc?export=view&id=1jzBJyF2LTQmB4bHroOaC2X5C500NahAG", r:"https://drive.google.com/uc?export=view&id=1q7DxKVfc6vWnsworWOpDqpSUh0y-KIw1", desc:"Freddie Mercury en escenario LEGO con micrófono y público. Representa performance, carisma desbordante y entrega total al arte."},
];

function randomCard(exclude=[]) {
  const pool = SSP_CARDS.filter(c => !exclude.includes(c.id));
  return pool[Math.floor(Math.random() * pool.length)];
}

// ── JUEGO STATE ──
let juegoState = {
  turno: 1,  // 1=personaje, 2=ia1, 3=obstaculo, 4=ia2, 5=deseo
  cards: {},  // {1: cardId, 2: cardId, 3: cardId, 4: cardId, 5: cardId}
  metaphors: {}, // {1: texto, 3: texto, 5: texto}
  iaFragments: {}, // {2: texto, 4: texto}
  storyComplete: false
};

function renderJuegoStage(saved) {
  // Restore state if saved
  if (saved.juegoState) juegoState = saved.juegoState;

  const turnoLabels = [
    {num:1, tipo:'emprendedor', emoji:'🧙', title:'El Personaje', sub:'Elige una carta que represente a tu cliente'},
    {num:2, tipo:'ia', emoji:'🤖', title:'La IA continúa...', sub:'La IA elige una carta y expande la historia'},
    {num:3, tipo:'emprendedor', emoji:'🐉', title:'El Obstáculo', sub:'Elige la carta que representa lo que lo frena'},
    {num:4, tipo:'ia', emoji:'🤖', title:'La IA continúa...', sub:'La IA elige una carta y profundiza la historia'},
    {num:5, tipo:'emprendedor', emoji:'⭐', title:'El Deseo Secreto', sub:'Elige la carta que representa su sueño oculto'},
  ];

  const steps = turnoLabels.map(t => {
    const isDone = juegoState.turno > t.num;
    const isActive = juegoState.turno === t.num;
    const isIA = t.tipo === 'ia';
    return `<div class="juego-step ${isDone?'done':isActive?'active':isIA?'ia':''}"></div>`;
  }).join('');

  let turnosHTML = turnoLabels.map(t => {
    const isDone = juegoState.turno > t.num;
    const isActive = juegoState.turno === t.num;
    const isIA = t.tipo === 'ia';

    let inner = `<div class="turno-header">
      <span class="turno-badge ${isIA?'ia':'emprendedor'}">${isIA?'IA':'Tú'}</span>
      <div><div class="turno-title">${t.emoji} ${t.title}</div><div class="turno-subtitle">${t.sub}</div></div>
    </div>`;

    if (isIA) {
      if (isDone && juegoState.cards[t.num]) {
        const card = SSP_CARDS.find(c => c.id === juegoState.cards[t.num]);
        inner += `<div class="ia-card-reveal">
          <div class="ia-card-img"><img src="${card?.f||''}" alt="Carta IA"></div>
          <div class="ia-card-text">Carta #${card?.id} elegida por la IA</div>
        </div>
        <div class="ia-story-fragment">${juegoState.iaFragments[t.num]||''}</div>`;
      } else if (isActive) {
        inner += `<button class="btn-juego btn-juego-ia" onclick="iaJugarTurno(${t.num})" id="btn-ia-turno-${t.num}">
          🤖 La IA juega su turno
        </button>`;
      }
    } else {
      if (isDone && juegoState.cards[t.num]) {
        const card = SSP_CARDS.find(c => c.id === juegoState.cards[t.num]);
        inner += `<div class="selected-card-row">
          <div class="selected-card-mini"><img src="${card?.f||''}" alt="Carta ${card?.id}"></div>
          <span style="font-size:.82rem;color:var(--jade)">Carta #${card?.id} — ${juegoState.metaphors[t.num]||''}</span>
        </div>`;
      } else if (isActive) {
        inner += `<div class="juego-cards-grid" id="juego-grid-${t.num}">
          ${SSP_CARDS.map(c => `<div class="juego-card ${juegoState.cards[t.num]===c.id?'selected':''}" onclick="juegoSelectCard(${t.num},${c.id})">
            <img src="${c.f}" alt="Carta ${c.id}" loading="lazy">
          </div>`).join('')}
        </div>
        ${juegoState.cards[t.num] ? `
        <div class="field-group">
          <label class="field-label">¿Qué ves en esta carta? ¿Qué te evoca?</label>
          <textarea class="juego-metaphor field-input" id="metaphor-${t.num}" rows="2" placeholder="Describe lo que ves y por qué elegiste esta carta...">${juegoState.metaphors[t.num]||''}</textarea>
        </div>
        <button class="btn-juego btn-juego-primary" onclick="juegoConfirmarTurno(${t.num})">Confirmar y continuar →</button>
        ` : ''}`;
      }
    }

    return `<div class="juego-turno ${isActive?'active':''} ${isDone?'done':''} ${isIA?'ia-turno':''}">${inner}</div>`;
  }).join('');

  return `<div class="juego-container">
    <div class="juego-progress">${steps}</div>
    ${turnosHTML}
    ${juegoState.storyComplete ? `<button class="btn-ai" id="btn-ai-historia" onclick="runAI('historia')">✦ Generar Mapa Emocional Completo</button>
    <button class="btn-regenerate ${saved.aiResult?'visible':''}" id="btn-regen-historia" onclick="regenAI('historia')">↺ Regenerar</button>` : ''}
  </div>`;
}

window.juegoSelectCard = (turno, cardId) => {
  juegoState.cards[turno] = cardId;
  // Re-render just the grid
  const grid = document.getElementById(`juego-grid-${turno}`);
  if (grid) {
    grid.querySelectorAll('.juego-card').forEach((el, i) => {
      el.classList.toggle('selected', SSP_CARDS[i]?.id === cardId);
    });
  }
  // Show metaphor input if not visible
  renderStage(currentStage);
};

window.juegoConfirmarTurno = (turno) => {
  const metaphorEl = document.getElementById(`metaphor-${turno}`);
  if (!metaphorEl || !metaphorEl.value.trim()) { showToast('Escribe qué ves en la carta'); return; }
  if (!juegoState.cards[turno]) { showToast('Elige una carta primero'); return; }
  juegoState.metaphors[turno] = metaphorEl.value.trim();
  juegoState.turno = turno + 1;
  if (!journeyData['historia']) journeyData['historia'] = {};
  journeyData['historia'].juegoState = juegoState;
  saveLocal();
  renderStage(currentStage);
};

window.iaJugarTurno = async (turno) => {
  const btn = document.getElementById(`btn-ia-turno-${turno}`);
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> La IA está jugando...'; }

  const e1 = journeyData['producto'] || {};
  const e3 = journeyData['segmento_revelado'] || {};
  const card1 = SSP_CARDS.find(c => c.id === juegoState.cards[1]);
  const card3 = turno === 4 ? SSP_CARDS.find(c => c.id === juegoState.cards[3]) : null;

  // Pick random card for IA (exclude already used)
  const usedIds = Object.values(juegoState.cards).filter(Boolean);
  const iaCard = randomCard(usedIds);
  juegoState.cards[turno] = iaCard.id;

  const contextSoFar = Object.keys(juegoState.metaphors).map(t =>
    `Carta ${t} (${t=='1'?'Personaje':t=='3'?'Obstáculo':'Deseo'}): ${juegoState.metaphors[t]}`
  ).join('\n');

  const fragmentAnterior = juegoState.iaFragments[2] ? `Fragmento anterior de la historia: ${juegoState.iaFragments[2]}` : '';

  const systemPrompt = `Eres un narrador de historias fantásticas colaborando con un emprendedor en la metodología SSP.

Contexto del negocio:
- Producto: ${e1.nombre||''} — ${e1.descripcion||''}
- Segmento revelado: ${e3.selectedSegmentText||''}

El emprendedor ha elegido cartas SSP y descrito lo que ve. Tú debes:
1. Tomar la carta aleatoria que te tocó (#${iaCard.id}) e interpretarla emocionalmente (no literalmente)
2. Escribir UN fragmento corto de historia (máximo 80 palabras) que continúe la narrativa
3. El fragmento debe conectar la carta del emprendedor con la tuya de forma poética

Contexto de la historia hasta ahora:
${contextSoFar}
${fragmentAnterior}

Responde SOLO con este JSON:
{"fragmento":"el fragmento de historia continuado, máximo 80 palabras, fantasioso y metafórico"}`;

  try {
    const resp = await fetch('https://anthropicproxy-z4dcljw5oa-uc.a.run.app', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 300,
        system: systemPrompt,
        messages: [{role: 'user', content: [
          {type: 'image', source: {type: 'url', url: iaCard.f}},
          {type: 'text', text: `La carta aleatoria que me tocó es la #${iaCard.id}: ${iaCard.desc}. Continúa la historia usando esta imagen como inspiración visual.`}
        ]}]
      })
    });
    const data = await resp.json();
    const raw = data.content?.[0]?.text || '{}';
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    juegoState.iaFragments[turno] = parsed.fragmento || '';
  } catch(e) {
    juegoState.iaFragments[turno] = 'La historia continúa en las sombras...';
    console.error(e);
  }

  juegoState.turno = turno + 1;
  if (juegoState.turno > 5) juegoState.storyComplete = true;
  if (!journeyData['historia']) journeyData['historia'] = {};
  journeyData['historia'].juegoState = juegoState;
  saveLocal();
  renderStage(currentStage);
};

// Override runAI for historia to use juego state
const _originalRunAI = window.runAI;
window.runAI = async (stageId) => {
  if (stageId !== 'historia') { return _originalRunAI(stageId); }

  if (!juegoState.storyComplete) { showToast('Completa los 5 turnos primero'); return; }

  const btn = document.getElementById('btn-ai-historia');
  const regen = document.getElementById('btn-regen-historia');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Generando mapa emocional...'; }

  const e1 = journeyData['producto'] || {};
  const e3 = journeyData['segmento_revelado'] || {};

  const storyContext = [
    `Turno 1 — Personaje (carta #${juegoState.cards[1]}): "${juegoState.metaphors[1]}"`,
    `Turno 2 — IA (carta #${juegoState.cards[2]}): "${juegoState.iaFragments[2]}"`,
    `Turno 3 — Obstáculo (carta #${juegoState.cards[3]}): "${juegoState.metaphors[3]}"`,
    `Turno 4 — IA (carta #${juegoState.cards[4]}): "${juegoState.iaFragments[4]}"`,
    `Turno 5 — Deseo Secreto (carta #${juegoState.cards[5]}): "${juegoState.metaphors[5]}"`,
  ].join('\n');

  const systemPrompt = `Eres un estratega emocional especialista en SSP (Smart Serious Play).

Una historia colaborativa entre un emprendedor y la IA ha sido co-creada usando cartas SSP. A partir de esa historia debes extraer el mapa emocional del cliente del emprendedor.

Contexto del negocio:
- Producto: ${e1.nombre||''} — ${e1.descripcion||''}
- Segmento revelado: ${e3.selectedSegmentText||''}

Historia co-creada:
${storyContext}

Extrae exactamente:
- 3 DOLORES (lo que carga, lo que pesa)
- 3 FRUSTRACIONES (lo que intenta y falla)
- 3 MIEDOS (lo que paraliza en silencio)

Para cada uno: insight (verdad no dicha) y accionador (acción/recurso/alianza concreta).

Responde SOLO con este JSON:
{"historia":"resumen poético de la historia co-creada en 100 palabras","elementos":[{"tipo":"💔 DOLOR","nombre":"nombre corto","descripcion":"descripción empática","insight":"verdad no dicha","accionador":"acción concreta"},{"tipo":"💔 DOLOR","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"💔 DOLOR","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"😤 FRUSTRACIÓN","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"😤 FRUSTRACIÓN","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"😤 FRUSTRACIÓN","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"😨 MIEDO","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"😨 MIEDO","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"😨 MIEDO","nombre":"","descripcion":"","insight":"","accionador":""}]}`;

  try {
    const resp = await fetch('https://anthropicproxy-z4dcljw5oa-uc.a.run.app', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 2000,
        system: systemPrompt,
        messages: [{role: 'user', content: 'Genera el mapa emocional completo de la historia.'}]
      })
    });
    const data = await resp.json();
    const raw = data.content?.[0]?.text || '{}';
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());

    if (!journeyData['historia']) journeyData['historia'] = {};
    journeyData['historia'].aiResult = `📖 HISTORIA CO-CREADA\n\n${parsed.historia}`;
    journeyData['historia'].accionadores = parsed.elementos.map(e => ({
      tipo: e.tipo, nombre: e.nombre, insight: e.insight, accionador: e.accionador
    }));
    saveLocal();
    if (regen) regen.classList.add('visible');
    renderStage(currentStage);
  } catch(e) {
    showToast('Error al generar mapa emocional');
    console.error(e);
  }

  if (btn) { btn.disabled = false; btn.innerHTML = '✦ Generar Mapa Emocional Completo'; }
};

</script>
</body>
</html>
