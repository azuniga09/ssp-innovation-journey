<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSP Innovation Journey · Guatemala</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0F0E1A; --surface:#1A1828; --surface2:#221F35; --jade:#4ECCA3;
  --jade-dim:rgba(78,204,163,0.15); --orange:#FF6B35; --orange-dim:rgba(255,107,53,0.15);
  --purple:#7C6FCD; --text:#E8E6F0; --muted:#8884A0; --border:rgba(255,255,255,0.08);
  --card-bg:#1E1C2E;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(15,14,26,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;z-index:100;}
.topbar-logo{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:900;color:var(--jade);letter-spacing:-1px;}
.topbar-logo span{color:var(--orange);}
.topbar-right{display:flex;align-items:center;gap:.75rem;}
.topbar-name{font-size:.85rem;color:var(--muted);}
.btn-reset{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.75rem;padding:.3rem .6rem;cursor:pointer;transition:all .2s;}
.btn-reset:hover{border-color:var(--orange);color:var(--orange);}

.app-layout{display:flex;padding-top:56px;min-height:100vh;}

.sidebar{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  padding:1.5rem 1rem;position:fixed;top:56px;left:0;bottom:0;overflow-y:auto;}
.sidebar-title{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:1.25rem;padding-left:.5rem;}
.stage-item{display:flex;align-items:flex-start;gap:.75rem;padding:.65rem .75rem;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:.25rem;}
.stage-item.active{background:var(--jade-dim);}
.stage-item.completed{opacity:.7;}
.stage-item:hover:not(.active){background:rgba(255,255,255,.04);}
.stage-num{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;color:var(--muted);flex-shrink:0;transition:all .2s;}
.stage-item.active .stage-num{border-color:var(--jade);color:var(--jade);background:var(--jade-dim);}
.stage-item.completed .stage-num{border-color:var(--jade);background:var(--jade);color:var(--bg);}
.stage-label{font-size:.8rem;line-height:1.3;color:var(--muted);}
.stage-item.active .stage-label{color:var(--text);}

.main{margin-left:260px;flex:1;padding:2.5rem 2rem;max-width:820px;}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:2rem;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--jade),var(--purple));border-radius:2px;transition:width .4s ease;}

.stage-card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:2rem;margin-bottom:1.5rem;position:relative;overflow:hidden;}
.stage-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--jade),var(--purple));}
.stage-eyebrow{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--jade);margin-bottom:.5rem;}
.stage-title{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:600;color:var(--text);margin-bottom:.5rem;line-height:1.2;}
.stage-prompt{color:var(--muted);font-size:.9rem;line-height:1.6;margin-bottom:1.5rem;}

.field-group{margin-bottom:1.25rem;}
.field-label{font-size:.75rem;color:var(--jade);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem;display:block;}
.field-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:.85rem 1rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;resize:none;}
.field-input:focus{border-color:var(--jade);}
.field-input::placeholder{color:var(--muted);opacity:.5;}

.photo-zone{border:2px dashed var(--border);border-radius:12px;padding:2rem;text-align:center;margin-bottom:1.25rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.photo-zone:hover{border-color:var(--jade);background:var(--jade-dim);}
.photo-zone.has-image{border-style:solid;border-color:var(--jade);padding:0;}
.photo-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:2;}
.photo-preview{width:100%;max-height:280px;object-fit:contain;border-radius:10px;display:none;}
.photo-preview.visible{display:block;}
.photo-placeholder{color:var(--muted);font-size:.9rem;pointer-events:none;}
.photo-placeholder .icon{font-size:2.5rem;margin-bottom:.5rem;display:block;}
.photo-zone.has-image .photo-placeholder{display:none;}
.photo-change{font-size:.72rem;color:var(--jade);margin-top:.35rem;display:none;padding:.5rem;}
.photo-zone.has-image .photo-change{display:block;}

.btn-ai{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--jade),#38b590);border:none;border-radius:10px;color:var(--bg);font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:.75rem;}
.btn-ai:hover{opacity:.9;transform:translateY(-1px);}
.btn-ai:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-save{background:linear-gradient(135deg,var(--purple),#6058b0);}
.btn-confirm{background:linear-gradient(135deg,var(--orange),#e55a2a);}

.btn-regenerate{width:100%;padding:.7rem;background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:.85rem;cursor:pointer;transition:all .2s;display:none;margin-bottom:.75rem;}
.btn-regenerate.visible{display:block;}
.btn-regenerate:hover{border-color:var(--jade);color:var(--jade);}

.ai-result{display:none;margin-top:1.25rem;}
.ai-result.visible{display:block;}
.ai-result-box{background:var(--orange-dim);border:1px solid rgba(255,107,53,.3);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.ai-result-eyebrow{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--orange);margin-bottom:.75rem;}
.ai-result-text{font-family:'Fraunces',serif;font-size:1rem;font-weight:300;line-height:1.7;color:var(--text);white-space:pre-wrap;}

.segment-selector{margin-top:1rem;}
.segment-label{font-size:.75rem;color:var(--jade);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.75rem;display:block;}
.segment-options{display:flex;flex-direction:column;gap:.5rem;}
.segment-option{padding:1rem;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;font-size:.88rem;line-height:1.5;}
.segment-option:hover{border-color:var(--jade);}
.segment-option.selected{border-color:var(--jade);background:var(--jade-dim);}
.segment-option-label{font-size:.7rem;color:var(--orange);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.35rem;font-weight:600;}
.segment-message{margin-top:.5rem;font-size:.82rem;color:var(--orange);font-style:italic;}

.accionadores-grid{display:flex;flex-direction:column;gap:.6rem;margin-top:1rem;}
.accionador-item{padding:.9rem 1rem;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;}
.accionador-item:hover{border-color:var(--purple);}
.accionador-item.selected{border-color:var(--jade);background:var(--jade-dim);}
.accionador-tipo{font-size:.68rem;color:var(--orange);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.2rem;font-weight:600;}
.accionador-nombre{font-size:.85rem;color:var(--text);font-weight:600;margin-bottom:.2rem;}
.accionador-insight{font-size:.78rem;color:var(--muted);margin-bottom:.3rem;font-style:italic;}
.accionador-accion{font-size:.85rem;color:var(--jade);}
.selection-count{font-size:.78rem;color:var(--muted);margin-top:.75rem;text-align:right;}
.selection-count span{color:var(--jade);font-weight:600;}

.wow-options{display:flex;flex-direction:column;gap:.75rem;margin-top:1rem;}
.wow-card{padding:1.25rem;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);}
.wow-card.funcional{border-color:rgba(78,204,163,.4);}
.wow-card.emocional{border-color:rgba(124,111,205,.4);}
.wow-card.simbolico{border-color:rgba(255,107,53,.4);}
.wow-type{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.5rem;font-weight:600;}
.wow-card.funcional .wow-type{color:var(--jade);}
.wow-card.emocional .wow-type{color:var(--purple);}
.wow-card.simbolico .wow-type{color:var(--orange);}
.wow-text{font-size:.9rem;line-height:1.6;color:var(--text);margin-bottom:.5rem;}
.wow-moment{font-family:'Fraunces',serif;font-style:italic;font-size:.95rem;color:var(--muted);}

.accepted-box{display:none;background:rgba(78,204,163,.06);border:1px solid rgba(78,204,163,.2);border-radius:10px;padding:1rem 1.25rem;margin-top:1rem;}
.accepted-box.visible{display:block;}
.accepted-label{font-size:.7rem;color:var(--jade);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.35rem;}
.accepted-text{font-size:.88rem;color:var(--text);line-height:1.5;white-space:pre-wrap;}

.stage-nav{display:flex;justify-content:space-between;margin-top:1.5rem;}
.btn-nav{padding:.7rem 1.4rem;border-radius:8px;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;}
.btn-prev{background:none;border:1px solid var(--border);color:var(--muted);}
.btn-prev:hover{border-color:var(--muted);color:var(--text);}
.btn-next{background:var(--jade);border:none;color:var(--bg);font-weight:600;}
.btn-next:hover{opacity:.85;}
.btn-next:disabled{opacity:.3;cursor:not-allowed;}

.summary-card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:2rem;margin-bottom:1rem;}
.summary-title{font-family:'Fraunces',serif;font-size:2rem;font-weight:900;color:var(--jade);margin-bottom:.25rem;}
.summary-subtitle{color:var(--muted);font-size:.85rem;margin-bottom:2rem;}
.summary-item{padding:1rem 0;border-bottom:1px solid var(--border);}
.summary-item:last-child{border-bottom:none;}
.summary-stage-name{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--jade);margin-bottom:.35rem;}
.summary-content{font-size:.9rem;color:var(--text);line-height:1.5;white-space:pre-wrap;}
.btn-download{width:100%;padding:1rem;background:linear-gradient(135deg,var(--orange),#e55a2a);border:none;border-radius:10px;color:white;font-size:.95rem;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:1rem;}
.btn-download:hover{opacity:.88;}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:#0F0E1A;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface2);border:1px solid var(--jade);color:var(--jade);padding:.75rem 1.25rem;border-radius:8px;font-size:.85rem;z-index:999;transform:translateY(100px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
@media(max-width:700px){.sidebar{display:none;}.main{margin-left:0;padding:1.25rem;}}

/* ── JUEGO STAGE ── */
.juego-container { display: flex; flex-direction: column; gap: 1.25rem; }
.juego-turno { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 12px; padding: 1.25rem; transition: all .2s; }
.juego-turno.active { border-color: var(--jade); background: var(--jade-dim); }
.juego-turno.done { border-color: rgba(78,204,163,.3); opacity: .85; }
.juego-turno.ia-turno { border-color: rgba(124,111,205,.3); background: rgba(124,111,205,.06); }
.juego-turno.ia-turno.active { border-color: var(--purple); background: rgba(124,111,205,.12); }
.turno-header { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
.turno-badge { font-size: .68rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; padding: .25rem .6rem; border-radius: 20px; }
.turno-badge.emprendedor { background: var(--jade-dim); color: var(--jade); }
.turno-badge.ia { background: rgba(124,111,205,.2); color: var(--purple); }
.turno-title { font-size: .9rem; font-weight: 600; color: var(--text); }
.turno-subtitle { font-size: .78rem; color: var(--muted); margin-top: .15rem; }

/* Card picker for juego */
.juego-cards-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: .4rem; max-height: 260px; overflow-y: auto; margin-bottom: .75rem; }
.juego-card { aspect-ratio: 3/4; border-radius: 7px; border: 2px solid var(--border); cursor: pointer; overflow: hidden; transition: all .15s; background: var(--surface2); }
.juego-card:hover { border-color: var(--jade); transform: scale(1.03); }
.juego-card.selected { border-color: var(--jade); box-shadow: 0 0 0 2px var(--jade); }
.juego-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* Selected card display */
.selected-card-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
.selected-card-mini { width: 36px; height: 48px; border-radius: 5px; overflow: hidden; flex-shrink: 0; border: 1.5px solid var(--jade); }
.selected-card-mini img { width: 100%; height: 100%; object-fit: cover; }

/* IA card reveal */
.ia-card-reveal { display: flex; align-items: center; gap: 1rem; padding: .75rem; background: rgba(124,111,205,.1); border-radius: 10px; margin-bottom: .75rem; }
.ia-card-img { width: 48px; height: 64px; border-radius: 6px; overflow: hidden; border: 2px solid var(--purple); flex-shrink: 0; }
.ia-card-img img { width: 100%; height: 100%; object-fit: cover; }
.ia-card-text { font-size: .85rem; color: var(--text); line-height: 1.5; }
.ia-story-fragment { font-family: 'Fraunces', serif; font-size: .95rem; font-style: italic; line-height: 1.7; color: var(--text); margin-top: .5rem; padding: .75rem; background: rgba(124,111,205,.08); border-radius: 8px; border-left: 3px solid var(--purple); }

.juego-metaphor { width: 100%; background: none; border: none; outline: none; color: var(--text); font-family: 'Fraunces', serif; font-size: 1rem; font-style: italic; line-height: 1.6; resize: none; min-height: 60px; }
.juego-metaphor::placeholder { color: var(--muted); opacity: .5; }

.btn-juego { padding: .7rem 1.25rem; border-radius: 8px; font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .15s; border: none; }
.btn-juego-primary { background: var(--jade); color: var(--bg); }
.btn-juego-primary:hover { opacity: .85; }
.btn-juego-primary:disabled { opacity: .3; cursor: not-allowed; }
.btn-juego-ia { background: var(--purple); color: white; }
.btn-juego-ia:hover { opacity: .85; }
.btn-juego-ia:disabled { opacity: .3; cursor: not-allowed; }

.juego-progress { display: flex; gap: .4rem; margin-bottom: 1.25rem; }
.juego-step { flex: 1; height: 4px; border-radius: 2px; background: var(--border); transition: background .3s; }
.juego-step.done { background: var(--jade); }
.juego-step.active { background: var(--purple); }
.juego-step.ia { background: rgba(124,111,205,.4); }


/* ── HISTORIA STAGE ── */
.historia-container { display: flex; flex-direction: column; gap: 1.5rem; }
.historia-parte {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color .2s;
}
.historia-parte:focus-within { border-color: var(--jade); }
.historia-parte-header {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: 1rem 1.25rem .75rem;
  border-bottom: 1px solid var(--border);
}
.historia-parte-emoji { font-size: 1.4rem; }
.historia-parte-title { font-size: .95rem; font-weight: 600; color: var(--text); }
.historia-ejemplo {
  display: flex;
  align-items: flex-start;
  gap: .5rem;
  margin: .75rem 1.25rem;
  padding: .65rem .85rem;
  background: rgba(78,204,163,.06);
  border-left: 3px solid rgba(78,204,163,.3);
  border-radius: 0 8px 8px 0;
}
.historia-ejemplo-icon { font-size: .8rem; color: var(--jade); flex-shrink: 0; margin-top: .1rem; }
.historia-ejemplo-text {
  font-size: .8rem;
  color: var(--muted);
  line-height: 1.5;
  font-style: italic;
}
.historia-body {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 1rem;
  padding: .75rem 1.25rem 1.25rem;
}
.historia-foto-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .4rem;
}
.historia-foto-upload {
  width: 100px;
  height: 130px;
  border: 2px dashed var(--border);
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: .7rem;
  color: var(--muted);
  text-align: center;
  gap: .3rem;
  position: relative;
  overflow: hidden;
  transition: all .2s;
  background: var(--surface);
}
.historia-foto-upload:hover { border-color: var(--jade); color: var(--jade); }
.historia-foto-upload.has-img { border-style: solid; border-color: var(--jade); padding: 0; }
.historia-foto-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.historia-foto-upload img { width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 8px; }
.historia-foto-upload.has-img img { display: block; }
.historia-foto-upload.has-img .foto-placeholder { display: none; }
.foto-placeholder { display: flex; flex-direction: column; align-items: center; gap: .25rem; pointer-events: none; }
.foto-placeholder span { font-size: 1.4rem; }
.historia-foto-label { font-size: .65rem; color: var(--muted); text-align: center; }
.historia-texto textarea {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: .85rem 1rem;
  color: var(--text);
  font-family: 'Fraunces', serif;
  font-size: .95rem;
  font-style: italic;
  line-height: 1.6;
  resize: none;
  outline: none;
  min-height: 100px;
  transition: border-color .2s;
}
.historia-texto textarea:focus { border-color: var(--jade); }
.historia-texto textarea::placeholder { color: var(--muted); opacity: .4; }

@media(max-width:600px) {
  .historia-body { grid-template-columns: 1fr; }
  .historia-foto-zone { flex-direction: row; align-items: center; }
  .historia-foto-upload { width: 80px; height: 105px; }
}


/* ── CAUSAL STAGE ── */
.causal-container { display: flex; flex-direction: column; gap: 1.25rem; }

.causal-foto-zone {
  border: 2px dashed var(--border);
  border-radius: 14px;
  padding: 1.5rem;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
  background: var(--surface2);
}
.causal-foto-zone:hover { border-color: var(--jade); background: var(--jade-dim); }
.causal-foto-zone.has-img { border-style: solid; border-color: var(--jade); padding: 0; }
.causal-foto-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 2; }
.causal-foto-preview { width: 100%; max-height: 320px; object-fit: contain; border-radius: 12px; display: none; }
.causal-foto-preview.visible { display: block; }
.causal-foto-zone.has-img .causal-placeholder { display: none; }
.causal-foto-zone.has-img .causal-change { display: block; }
.causal-placeholder { color: var(--muted); }
.causal-placeholder .icon { font-size: 2.5rem; display: block; margin-bottom: .5rem; }
.causal-change { display: none; font-size: .75rem; color: var(--jade); padding: .5rem; }

.causal-field {
  background: var(--card-bg);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 1.25rem;
  transition: border-color .2s;
}
.causal-field:focus-within { border-color: var(--jade); }
.causal-field-header {
  display: flex; align-items: center; gap: .6rem;
  margin-bottom: .6rem;
}
.causal-field-emoji { font-size: 1.3rem; }
.causal-field-title { font-size: .9rem; font-weight: 600; color: var(--text); }
.causal-field-ejemplo {
  display: flex; gap: .5rem; align-items: flex-start;
  padding: .6rem .8rem;
  background: rgba(78,204,163,.06);
  border-left: 3px solid rgba(78,204,163,.3);
  border-radius: 0 8px 8px 0;
  margin-bottom: .75rem;
  font-size: .78rem; color: var(--muted); font-style: italic; line-height: 1.5;
}
.causal-field textarea {
  width: 100%; background: var(--surface2);
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: .85rem 1rem; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: .9rem;
  outline: none; resize: none; transition: border-color .2s;
}
.causal-field textarea:focus { border-color: var(--jade); }
.causal-field textarea::placeholder { color: var(--muted); opacity: .4; }


/* ── FLOATING SSP TEST BUTTON ── */
.btn-ssp-test {
  position: fixed;
  bottom: 1.5rem;
  left: 1.5rem;
  z-index: 200;
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .7rem 1.1rem;
  background: linear-gradient(135deg, var(--purple), #5a4fb0);
  border: none;
  border-radius: 50px;
  color: white;
  font-family: 'Inter', sans-serif;
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 4px 20px rgba(124,111,205,.4);
  transition: all .2s;
}
.btn-ssp-test:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(124,111,205,.6);
}
.btn-ssp-test .test-emoji { font-size: 1rem; }
.btn-ssp-test .test-text { line-height: 1.2; }
.btn-ssp-test .test-sub { font-size: .68rem; font-weight: 400; opacity: .8; display: block; }


/* ── RESPONSIVE MOBILE ── */
@media (max-width: 768px) {

  /* Sidebar oculto en móvil */
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 1rem; max-width: 100%; }

  /* Topbar */
  .topbar { padding: 0 1rem; }
  .topbar-logo { font-size: 1.1rem; }
  .user-name { display: none; }

  /* Stage card */
  .stage-card { padding: 1.25rem; border-radius: 12px; }
  .stage-title { font-size: 1.4rem; }
  .stage-prompt { font-size: .85rem; }

  /* Fields */
  .field-input { font-size: 1rem; padding: .9rem; }

  /* Photo zone */
  .photo-zone { padding: 1.5rem 1rem; }
  .photo-placeholder .icon { font-size: 2rem; }

  /* Buttons — más grandes para dedos */
  .btn-ai { padding: 1rem; font-size: .95rem; min-height: 52px; }
  .btn-nav { padding: .85rem 1.2rem; font-size: .9rem; min-height: 48px; }
  .btn-save, .btn-confirm { min-height: 52px; }

  /* Stage nav */
  .stage-nav { gap: .5rem; }
  .btn-prev, .btn-next { flex: 1; text-align: center; }

  /* Historia stage — apilar verticalmente */
  .historia-body {
    grid-template-columns: 1fr;
    gap: .75rem;
  }
  .historia-foto-zone {
    flex-direction: row;
    align-items: center;
    gap: .75rem;
  }
  .historia-foto-upload {
    width: 80px;
    height: 105px;
    flex-shrink: 0;
  }
  .historia-foto-label { text-align: left; }
  .historia-texto textarea { min-height: 80px; font-size: .95rem; }
  .historia-ejemplo { margin: .5rem .75rem; }
  .historia-parte-header { padding: .85rem 1rem .6rem; }

  /* Causal stage */
  .causal-foto-preview { max-height: 220px; }
  .causal-field { padding: 1rem; }

  /* AI result */
  .ai-result-text { font-size: .9rem; }

  /* Segment options */
  .segment-option { padding: .85rem; font-size: .85rem; }
  .accionador-item { padding: .85rem; }

  /* WOW cards */
  .wow-card { padding: 1rem; }

  /* Floating button — más compacto */
  .btn-ssp-test {
    bottom: 1rem;
    left: 1rem;
    padding: .6rem .9rem;
    font-size: .75rem;
  }
  .btn-ssp-test .test-sub { display: none; }

  /* Progress bar */
  .progress-bar { margin-bottom: 1.25rem; }

  /* Summary */
  .summary-card { padding: 1.25rem; }
  .summary-title { font-size: 1.5rem; }

  /* Toast — arriba en móvil para no tapar botones */
  .toast {
    bottom: auto;
    top: 70px;
    right: 1rem;
    left: 1rem;
    text-align: center;
  }

  /* Juego cards grid */
  .juego-cards-grid { grid-template-columns: repeat(4, 1fr); max-height: 220px; }
}

@media (max-width: 400px) {
  .stage-title { font-size: 1.2rem; }
  .historia-foto-upload { width: 70px; height: 90px; }
  .juego-cards-grid { grid-template-columns: repeat(3, 1fr); }
  .btn-ai { font-size: .88rem; }
}

</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Smart Serious Play <span style="font-size:.8rem;font-weight:300;color:var(--muted);letter-spacing:.05em">Life is a Game</span></div>
  <div class="topbar-right">
    <span class="topbar-name">Creative Business Cup Guatemala 2026</span>
    <button class="btn-reset" onclick="resetJourney()">↺ Reiniciar</button>
  </div>
</div>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-title">Tu Journey</div>
    <div id="stage-nav-list"></div>
  </aside>
  <main class="main">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div id="stage-view"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const STAGES = [
  {
    id:'producto', num:1, title:'Descripción del Producto', mode:'texto',
    prompt:'Describe tu producto o servicio. ¿Qué es, qué hace, cómo funciona? Sé específico — esta información alimentará todo tu proceso de innovación.',
    fields:[
      {key:'nombre', label:'Nombre de tu producto o servicio', placeholder:'Ej: Plataforma de gestión para restaurantes...', rows:2},
      {key:'descripcion', label:'¿Qué hace y cómo funciona?', placeholder:'Describe en detalle qué problema resuelve y cómo lo resuelve...', rows:4},
      {key:'diferencia', label:'¿Qué lo hace diferente a lo que ya existe?', placeholder:'Tu ventaja o característica única...', rows:3},
    ]
  },
  {
    id:'segmento_logico', num:2, title:'Segmento de Mercado Lógico', mode:'texto',
    prompt:'¿A quién crees que va dirigido tu producto? Describe a ese cliente "obvio" — el que todos esperarían que te comprara.',
    fields:[
      {key:'quien', label:'¿Quién es tu cliente lógico?', placeholder:'Describe a esa persona: qué hace, dónde está, qué necesita...', rows:3},
      {key:'necesidad', label:'¿Cuál es su necesidad obvia?', placeholder:'El problema evidente que tu producto resuelve para ellos...', rows:3},
      {key:'porque', label:'¿Por qué crees que te compraría?', placeholder:'La razón lógica por la que elegiría tu producto...', rows:3},
    ]
  },
  {
    id:'segmento_revelado', num:3, title:'Segmento de Mercado Revelado', mode:'foto_ia',
    prompt:'Elige una o varias cartas SSP que evoquen a tu cliente real. Fotografía las cartas y responde las preguntas — la IA descubrirá tu segmento revelado.',
    photoLabel:'📸 Sube la foto de tus cartas SSP elegidas',
    questions:[
      {key:'q1', label:'¿Qué hace tu cliente en su día a día?', placeholder:'Describe su rutina, contexto, entorno...', rows:2},
      {key:'q2', label:'¿Qué emoción vive frecuentemente con el problema que resuelves?', placeholder:'Ansiedad, frustración, esperanza, confusión...', rows:2},
      {key:'q3', label:'¿Qué ha intentado antes y no le ha funcionado?', placeholder:'Soluciones anteriores que no resolvieron su problema...', rows:2},
      {key:'q4', label:'¿Qué cambio desea lograr si tu producto realmente funciona?', placeholder:'El sueño que tiene, la transformación que busca...', rows:2},
    ],
    aiButton:'✦ Descubrir mi Segmento Revelado',
    outputMode:'segmentos'
  },
  {
    id:'historia', num:4, title:'Historia Fantasiosa → Dolores, Insights y Accionadores', mode:'historia',
    prompt:'Con tus cartas SSP físicas construye una historia fantástica de tu cliente. Sube la foto de las cartas que elegiste para cada parte y escribe tu versión. La IA la transformará en una historia emotiva y extraerá tu mapa emocional.',
    aiButton:'✦ Generar Historia y Mapa Emocional',
    outputMode:'accionadores'
  },
  {
    id:'modelo_causal', num:5, title:'Modelo Causal', mode:'causal',
    prompt:'Llena la matriz física que te dio el facilitador. Valora los grados de causalidad entre tus 6 insights y accionadores. Luego fotografía tu matriz y registra el ganador.',
  },
  {
    id:'factor_wow', num:6, title:'Propuesta de Valor y Factor WOW', mode:'solo_ia',
    prompt:'Con todo tu proceso construido, la IA generará tu Propuesta de Valor y tu Factor WOW — ese elemento único e irrepetible que hará que tus clientes digan ¡WOW!',
    aiButton:'✦ Generar mi Propuesta de Valor y Factor WOW',
    outputMode:'wow'
  },
];

let currentStage = 0;
let journeyData = JSON.parse(localStorage.getItem('ssp_journey') || '{}');
let photoBase64 = {};

function saveLocal() {
  const toSave = {};
  Object.keys(journeyData).forEach(k => {
    toSave[k] = {...journeyData[k]};
    delete toSave[k].photoThumb; // thumbnails son muy grandes para localStorage
  });
  try { localStorage.setItem('ssp_journey', JSON.stringify(toSave)); } catch(e) {}
}

window.resetJourney = () => {
  if (!confirm('¿Reiniciar todo el proceso? Se perderán tus respuestas.')) return;
  localStorage.removeItem('ssp_journey');
  journeyData = {};
  photoBase64 = {};
  currentStage = 0;
  renderSidebar();
  renderStage(0);
};

// ── SIDEBAR ──
function renderSidebar() {
  const nav = document.getElementById('stage-nav-list');
  const allDone = STAGES.every(s => journeyData[s.id]?.completed);
  nav.innerHTML = STAGES.map((s, i) => {
    const done = journeyData[s.id]?.completed;
    const active = i === currentStage;
    return `<div class="stage-item ${active?'active':''} ${done&&!active?'completed':''}" onclick="goToStage(${i})">
      <div class="stage-num">${done&&!active?'✓':i+1}</div>
      <div class="stage-label">${s.title}</div>
    </div>`;
  }).join('') + (allDone ? `
    <div class="stage-item" onclick="showSummary()" style="margin-top:.5rem">
      <div class="stage-num" style="border-color:var(--orange);color:var(--orange)">★</div>
      <div class="stage-label" style="color:var(--orange)">Ver mi Proceso Completo</div>
    </div>` : '');
}

window.goToStage = (i) => { currentStage = i; renderSidebar(); renderStage(i); };

// ── RENDER STAGE ──
function renderStage(idx) {
  if (idx >= STAGES.length) { showSummary(); return; }
  const stage = STAGES[idx];
  const saved = journeyData[stage.id] || {};
  const completed = STAGES.filter(s => journeyData[s.id]?.completed).length;
  document.getElementById('progress-fill').style.width = Math.round((completed/STAGES.length)*100) + '%';

  let html = `<div class="stage-card">
    <div class="stage-eyebrow">Etapa ${stage.num} de ${STAGES.length}</div>
    <div class="stage-title">${stage.title}</div>
    <p class="stage-prompt">${stage.prompt}</p>`;

  if (stage.mode === 'texto') {
    html += stage.fields.map(f => `
      <div class="field-group">
        <label class="field-label">${f.label}</label>
        <textarea class="field-input" id="field-${f.key}" rows="${f.rows}" placeholder="${f.placeholder}">${saved[f.key]||''}</textarea>
      </div>`).join('');
    html += `<button class="btn-ai btn-save" onclick="saveTextStage('${stage.id}')">✓ Guardar y continuar</button>`;
  }

  if (stage.mode === 'foto_ia') {
    html += `<div class="photo-zone ${saved.photoThumb?'has-image':''}" id="photo-zone-${stage.id}">
      <input type="file" accept="image/*" id="photo-input-${stage.id}" capture="environment">
      <img class="photo-preview ${saved.photoThumb?'visible':''}" id="photo-preview-${stage.id}" src="${saved.photoThumb||''}" alt="">
      <div class="photo-placeholder"><span class="icon">📸</span>${stage.photoLabel}</div>
      <div class="photo-change">Toca para cambiar la foto</div>
    </div>`;
    html += stage.questions.map(q => `
      <div class="field-group">
        <label class="field-label">${q.label}</label>
        <textarea class="field-input" id="q-${q.key}" rows="${q.rows}" placeholder="${q.placeholder}">${saved[q.key]||''}</textarea>
      </div>`).join('');
  }

  if (stage.mode === 'historia') {
    html += renderHistoriaStage(saved);
  }

  if (stage.mode === 'causal') {
    html += renderCausalStage(saved);
    html += `<button class="btn-ai" style="background:linear-gradient(135deg,var(--purple),#6058b0)" onclick="saveCausalStage()">✓ Guardar Modelo Causal</button>`;
  }

  if (stage.mode === 'foto_ia' || stage.mode === 'solo_ia' || stage.mode === 'juego' || stage.mode === 'historia' || stage.mode === 'causal') {
    html += `<button class="btn-ai" id="btn-ai-${stage.id}" onclick="runAI('${stage.id}')">${stage.aiButton}</button>
    <button class="btn-regenerate ${saved.aiResult?'visible':''}" id="btn-regen-${stage.id}" onclick="regenAI('${stage.id}')">↺ Regenerar respuesta</button>`;
    html += renderAIResult(stage, saved);
  }

  if (saved.completed) {
    html += `<div class="accepted-box visible">
      <div class="accepted-label">✓ Etapa completada</div>
      <div class="accepted-text">${saved.completedSummary||''}</div>
    </div>`;
  }

  html += `</div>
  <div class="stage-nav">
    <button class="btn-nav btn-prev" onclick="prevStage()" ${idx===0?'disabled':''}>← Anterior</button>
    <button class="btn-nav btn-next" id="btn-next" onclick="nextStage()" ${!saved.completed?'disabled':''}>
      ${idx===STAGES.length-1?'Ver mi proceso →':'Siguiente →'}
    </button>
  </div>`;

  document.getElementById('stage-view').innerHTML = html;
  initPhoto(stage, saved);
}

function renderAIResult(stage, saved) {
  if (!saved.aiResult) return `<div class="ai-result" id="ai-result-${stage.id}"></div>`;

  let inner = `<div class="ai-result-box">
    <div class="ai-result-eyebrow">✦ Resultado generado</div>
    <div class="ai-result-text">${saved.aiResult}</div>
  </div>`;

  if (stage.outputMode === 'segmentos' && saved.segments) {
    inner += `<div class="segment-selector">
      <span class="segment-label">Elige el segmento que más representa a tu cliente real:</span>
      <div class="segment-options">
        ${saved.segments.map((seg, i) => `
          <div class="segment-option ${saved.selectedSegment===i?'selected':''}" onclick="selectSegment(${i})">
            <div class="segment-option-label">${seg.label}</div>
            ${seg.text}
            <div class="segment-message">"${seg.message}"</div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  if (stage.outputMode === 'accionadores' && saved.accionadores) {
    const sel = saved.selectedAccionadores || [];
    inner += `<div class="segment-selector">
      <span class="segment-label">Elige máximo 6 que más resuenan con tu realidad:</span>
      <div class="accionadores-grid">
        ${saved.accionadores.map((a, i) => `
          <div class="accionador-item ${sel.includes(i)?'selected':''}" onclick="toggleAcc(${i})">
            <div class="accionador-tipo">${a.tipo}</div>
            <div class="accionador-nombre">${a.nombre}</div>
            <div class="accionador-insight">💡 ${a.insight}</div>
            <div class="accionador-accion">⚡ ${a.accionador}</div>
          </div>`).join('')}
      </div>
      <div class="selection-count">Seleccionados: <span>${sel.length}</span> / 6</div>
      ${sel.length > 0 ? `<button class="btn-ai btn-confirm" style="margin-top:1rem" onclick="confirmAcc()">✓ Confirmar mis ${sel.length} seleccionados</button>` : ''}
    </div>`;
  }

  if (stage.outputMode === 'wow' && saved.wowCards) {
    inner += `<div class="wow-options">
      ${saved.wowCards.map(w => `
        <div class="wow-card ${w.tipo}">
          <div class="wow-type">✨ Factor WOW ${w.tipo.toUpperCase()}</div>
          <div class="wow-text">${w.texto}</div>
          <div class="wow-moment">"${w.momento}"</div>
        </div>`).join('')}
    </div>
    <button class="btn-ai btn-confirm" style="margin-top:1rem" onclick="acceptWOW()">✓ Este es mi Factor WOW</button>`;
  }

  return `<div class="ai-result visible" id="ai-result-${stage.id}">${inner}</div>`;
}

// ── PHOTO ──
function initPhoto(stage, saved) {
  const input = document.getElementById(`photo-input-${stage.id}`);
  if (!input) return;
  input.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const b64full = ev.target.result;
      photoBase64[stage.id] = b64full.split(',')[1];
      if (!journeyData[stage.id]) journeyData[stage.id] = {};
      journeyData[stage.id].photoThumb = b64full;
      const preview = document.getElementById(`photo-preview-${stage.id}`);
      const zone = document.getElementById(`photo-zone-${stage.id}`);
      if (preview) { preview.src = b64full; preview.classList.add('visible'); }
      if (zone) zone.classList.add('has-image');
      showToast('📸 Foto cargada');
    };
    reader.readAsDataURL(file);
  });
}

// ── SAVE TEXT ──
window.saveTextStage = (stageId) => {
  const stage = STAGES.find(s => s.id === stageId);
  if (!journeyData[stageId]) journeyData[stageId] = {};
  let summary = '';
  stage.fields.forEach(f => {
    const el = document.getElementById(`field-${f.key}`);
    if (el) { journeyData[stageId][f.key] = el.value.trim(); summary += `${f.label}:\n${el.value.trim()}\n\n`; }
  });
  journeyData[stageId].completed = true;
  journeyData[stageId].completedSummary = summary.trim();
  saveLocal();
  document.getElementById('btn-next').disabled = false;
  renderSidebar();
  showToast('✓ Guardado');
};

// ── RUN AI ──
window.runAI = async (stageId) => {
  const stage = STAGES.find(s => s.id === stageId);
  const saved = journeyData[stageId] || {};
  const btn = document.getElementById(`btn-ai-${stageId}`);
  const regen = document.getElementById(`btn-regen-${stageId}`);

  if (stage.mode === 'foto_ia' && !photoBase64[stageId] && !saved.photoThumb) {
    showToast('📸 Sube primero la foto de tus cartas'); return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generando...';

  try {
    const e1 = journeyData['producto'] || {};
    const e2 = journeyData['segmento_logico'] || {};
    const e3 = journeyData['segmento_revelado'] || {};
    const e4 = journeyData['historia'] || {};
    const e5 = journeyData['modelo_causal'] || {};

    let systemPrompt = '';
    let userContent = [];
    const imgData = photoBase64[stageId];
    const hasImg = !!imgData;

    if (stageId === 'segmento_revelado') {
      const qs = stage.questions.map(q => {
        const el = document.getElementById(`q-${q.key}`);
        return `${q.label}: ${el?.value || saved[q.key] || ''}`;
      }).join('\n');

      systemPrompt = `Eres un experto en segmentación revelada, creatividad estratégica y branding emocional, especialista en la metodología SSP (Smart Serious Play).

El emprendedor ha elegido físicamente cartas SSP como detonador simbólico y las ha fotografiado. Esa imagen es tu restricción creativa — interprétala emocionalmente, no literalmente.

Contexto del emprendedor:
- Producto: ${e1.nombre||''} — ${e1.descripcion||''}
- Segmento lógico: ${e2.quien||''}

Tu tarea:
1. Interpreta simbólicamente las cartas en función de las respuestas
2. Genera 3 segmentos revelados: emocional/crudo, contradicción emocional, anhelo profundo
3. Para cada segmento un mensaje emocional gancho

Reglas: no describas las cartas literalmente, no uses edad ni género, voz cálida y profunda, responde en español.

Responde SOLO con este JSON exacto (sin texto adicional):
{"interpretacion":"metáfora emocional de las cartas","segmentos":[{"label":"Emocional — crudo y empático","text":"descripción","message":"mensaje gancho"},{"label":"Contradicción emocional","text":"descripción","message":"mensaje gancho"},{"label":"Anhelo profundo no resuelto","text":"descripción","message":"mensaje gancho"}]}`;

      userContent = hasImg
        ? [{type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgData}},{type:'text',text:`Estas son las cartas SSP que elegí.\n\nMis respuestas:\n${qs}`}]
        : [{type:'text',text:`No se pudo cargar la imagen.\n\nMis respuestas:\n${qs}`}];
    }

    if (stageId === 'historia') {
      const qs = stage.questions.map(q => {
        const el = document.getElementById(`q-${q.key}`);
        return `${q.label}: ${el?.value || saved[q.key] || ''}`;
      }).join('\n');

      systemPrompt = `Eres un maestro narrador simbólico y estratega emocional, especialista en SSP (Smart Serious Play).

El emprendedor eligió cartas SSP físicamente. Esas cartas son tu restricción creativa — úsalas como atmósfera, no las describas literalmente.

Contexto:
- Producto: ${e1.nombre||''} — ${e1.descripcion||''}
- Segmento revelado: ${e3.selectedSegmentText||''}

MOMENTO 1 — LA HISTORIA: Escribe una historia corta (máximo 150 palabras), fantasiosa, protagonizada por el personaje. Tensión, conflicto y un destello de esperanza.

MOMENTO 2 — MAPA EMOCIONAL: Extrae exactamente 3 dolores, 3 frustraciones, 3 miedos. Para cada uno: insight (verdad no dicha) y accionador (acción/recurso/alianza concreta).

Responde SOLO con este JSON exacto:
{"historia":"texto completo de la historia","elementos":[{"tipo":"💔 DOLOR","nombre":"nombre corto","descripcion":"descripción empática","insight":"verdad no dicha","accionador":"acción/recurso/alianza"},{"tipo":"💔 DOLOR","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"💔 DOLOR","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"😤 FRUSTRACIÓN","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"😤 FRUSTRACIÓN","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"😤 FRUSTRACIÓN","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"😨 MIEDO","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"😨 MIEDO","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"😨 MIEDO","nombre":"","descripcion":"","insight":"","accionador":""}]}`;

      userContent = hasImg
        ? [{type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgData}},{type:'text',text:`Cartas SSP elegidas.\n\nRespuestas:\n${qs}`}]
        : [{type:'text',text:`Respuestas:\n${qs}`}];
    }

    if (stageId === 'factor_wow') {
      const selAcc = (e4.selectedAccionadores||[]).map(i => e4.accionadores?.[i]).filter(Boolean);
      systemPrompt = `Eres un estratega de innovación y branding emocional, especialista en SSP (Smart Serious Play).

Contexto completo del emprendedor:
- Producto: ${e1.nombre||''} — ${e1.descripcion||''}
- Segmento lógico: ${e2.quien||''}

          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const maxW = 600;
            const scale = Math.min(1, maxW / Math.max(img.width, img.height));

function randomCard(exclude=[]) {
  const pool = SSP_CARDS.filter(c => !exclude.includes(c.id));
  return pool[Math.floor(Math.random() * pool.length)];
}

// ── JUEGO STATE ──
let juegoState = {
  turno: 1,  // 1=personaje, 2=ia1, 3=obstaculo, 4=ia2, 5=deseo
  cards: {},  // {1: cardId, 2: cardId, 3: cardId, 4: cardId, 5: cardId}
  metaphors: {}, // {1: texto, 3: texto, 5: texto}
  iaFragments: {}, // {2: texto, 4: texto}
  storyComplete: false
};

function renderJuegoStage(saved) {
  // Restore state if saved
  if (saved.juegoState) juegoState = saved.juegoState;

  const turnoLabels = [
    {num:1, tipo:'emprendedor', emoji:'🧙', title:'El Personaje', sub:'Elige una carta que represente a tu cliente'},
    {num:2, tipo:'ia', emoji:'🤖', title:'La IA continúa...', sub:'La IA elige una carta y expande la historia'},
    {num:3, tipo:'emprendedor', emoji:'🐉', title:'El Obstáculo', sub:'Elige la carta que representa lo que lo frena'},
    {num:4, tipo:'ia', emoji:'🤖', title:'La IA continúa...', sub:'La IA elige una carta y profundiza la historia'},
    {num:5, tipo:'emprendedor', emoji:'⭐', title:'El Deseo Secreto', sub:'Elige la carta que representa su sueño oculto'},
  ];

  const steps = turnoLabels.map(t => {
    const isDone = juegoState.turno > t.num;
    const isActive = juegoState.turno === t.num;
    const isIA = t.tipo === 'ia';
    return `<div class="juego-step ${isDone?'done':isActive?'active':isIA?'ia':''}"></div>`;
  }).join('');

  let turnosHTML = turnoLabels.map(t => {
    const isDone = juegoState.turno > t.num;
    const isActive = juegoState.turno === t.num;
    const isIA = t.tipo === 'ia';

    let inner = `<div class="turno-header">
      <span class="turno-badge ${isIA?'ia':'emprendedor'}">${isIA?'IA':'Tú'}</span>
      <div><div class="turno-title">${t.emoji} ${t.title}</div><div class="turno-subtitle">${t.sub}</div></div>
    </div>`;

    if (isIA) {
      if (isDone && juegoState.cards[t.num]) {
        const card = SSP_CARDS.find(c => c.id === juegoState.cards[t.num]);
        inner += `<div class="ia-card-reveal">
          <div class="ia-card-img"><img src="${card?.f||''}" alt="Carta IA"></div>
          <div class="ia-card-text">Carta #${card?.id} elegida por la IA</div>
        </div>
        <div class="ia-story-fragment">${juegoState.iaFragments[t.num]||''}</div>`;
      } else if (isActive) {
        inner += `<button class="btn-juego btn-juego-ia" onclick="iaJugarTurno(${t.num})" id="btn-ia-turno-${t.num}">
          🤖 La IA juega su turno
        </button>`;
      }
    } else {
      if (isDone && juegoState.cards[t.num]) {
        const card = SSP_CARDS.find(c => c.id === juegoState.cards[t.num]);
        inner += `<div class="selected-card-row">
          <div class="selected-card-mini"><img src="${card?.f||''}" alt="Carta ${card?.id}"></div>
          <span style="font-size:.82rem;color:var(--jade)">Carta #${card?.id} — ${juegoState.metaphors[t.num]||''}</span>
        </div>`;
      } else if (isActive) {
        inner += `<div class="juego-cards-grid" id="juego-grid-${t.num}">
          ${SSP_CARDS.map(c => `<div class="juego-card ${juegoState.cards[t.num]===c.id?'selected':''}" onclick="juegoSelectCard(${t.num},${c.id})">
            <img src="${c.f}" alt="Carta ${c.id}" loading="lazy">
          </div>`).join('')}
        </div>
        ${juegoState.cards[t.num] ? `
        <div class="field-group">
          <label class="field-label">¿Qué ves en esta carta? ¿Qué te evoca?</label>
          <textarea class="juego-metaphor field-input" id="metaphor-${t.num}" rows="2" placeholder="Describe lo que ves y por qué elegiste esta carta...">${juegoState.metaphors[t.num]||''}</textarea>
        </div>
        <button class="btn-juego btn-juego-primary" onclick="juegoConfirmarTurno(${t.num})">Confirmar y continuar →</button>
        ` : ''}`;
      }
    }

    return `<div class="juego-turno ${isActive?'active':''} ${isDone?'done':''} ${isIA?'ia-turno':''}">${inner}</div>`;
  }).join('');

  return `<div class="juego-container">
    <div class="juego-progress">${steps}</div>
    ${turnosHTML}
    ${juegoState.storyComplete ? `<button class="btn-ai" id="btn-ai-historia" onclick="runAI('historia')">✦ Generar Mapa Emocional Completo</button>
    <button class="btn-regenerate ${saved.aiResult?'visible':''}" id="btn-regen-historia" onclick="regenAI('historia')">↺ Regenerar</button>` : ''}
  </div>`;
}

window.juegoSelectCard = (turno, cardId) => {
  juegoState.cards[turno] = cardId;
  // Re-render just the grid
  const grid = document.getElementById(`juego-grid-${turno}`);
  if (grid) {
    grid.querySelectorAll('.juego-card').forEach((el, i) => {
      el.classList.toggle('selected', SSP_CARDS[i]?.id === cardId);
    });
  }
  // Show metaphor input if not visible
  renderStage(currentStage);
};

window.juegoConfirmarTurno = (turno) => {
  const metaphorEl = document.getElementById(`metaphor-${turno}`);
  if (!metaphorEl || !metaphorEl.value.trim()) { showToast('Escribe qué ves en la carta'); return; }
  if (!juegoState.cards[turno]) { showToast('Elige una carta primero'); return; }
  juegoState.metaphors[turno] = metaphorEl.value.trim();
  juegoState.turno = turno + 1;
  if (!journeyData['historia']) journeyData['historia'] = {};
  journeyData['historia'].juegoState = juegoState;
  saveLocal();
  renderStage(currentStage);
};

window.iaJugarTurno = async (turno) => {
  const btn = document.getElementById(`btn-ia-turno-${turno}`);
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> La IA está jugando...'; }

  const e1 = journeyData['producto'] || {};
  const e3 = journeyData['segmento_revelado'] || {};
  const card1 = SSP_CARDS.find(c => c.id === juegoState.cards[1]);
  const card3 = turno === 4 ? SSP_CARDS.find(c => c.id === juegoState.cards[3]) : null;

  // Pick random card for IA (exclude already used)
  const usedIds = Object.values(juegoState.cards).filter(Boolean);
  const iaCard = randomCard(usedIds);
  juegoState.cards[turno] = iaCard.id;

  const contextSoFar = Object.keys(juegoState.metaphors).map(t =>
    `Carta ${t} (${t=='1'?'Personaje':t=='3'?'Obstáculo':'Deseo'}): ${juegoState.metaphors[t]}`
  ).join('\n');

  const fragmentAnterior = juegoState.iaFragments[2] ? `Fragmento anterior de la historia: ${juegoState.iaFragments[2]}` : '';

  const systemPrompt = 'Eres un narrador de historias fantásticas colaborando con un emprendedor en la metodología SSP.' +
    '\n\nContexto del negocio:' +
    '\n- Producto: ' + (e1.nombre||'') + ' — ' + (e1.descripcion||'') +
    '\n- Segmento revelado: ' + (e3.selectedSegmentText||'') +
    '\n\nEl emprendedor ha elegido cartas SSP y descrito lo que ve. Tú debes:' +
    '\n1. Tomar la carta aleatoria que te tocó (#' + iaCard.id + ') e interpretarla emocionalmente (no literalmente)' +
    '\n2. Escribir UN fragmento corto de historia (máximo 80 palabras) que continúe la narrativa' +
    '\n3. El fragmento debe conectar la carta del emprendedor con la tuya de forma poética' +
    '\n\nContexto de la historia hasta ahora:\n' + contextSoFar +
    '\n' + fragmentAnterior +
    '\n\nResponde SOLO con este JSON:' +
    '\n{"fragmento":"el fragmento de historia continuado, máximo 80 palabras, fantasioso y metafórico"}';

  try {
    const resp = await fetch('https://anthropicproxy-z4dcljw5oa-uc.a.run.app', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 300,
        system: systemPrompt,
        messages: [{role: 'user', content: [
          {type: 'image', source: {type: 'url', url: iaCard.f}},
          {type: 'text', text: `La carta aleatoria que me tocó es la #${iaCard.id}: ${iaCard.desc}. Continúa la historia usando esta imagen como inspiración visual.`}
        ]}]
      })
    });
    const data = await resp.json();
    const raw = data.content?.[0]?.text || '{}';
    let parsed;
    try {
      const clean = raw
        .replace(/```json|```/g,'')
        .replace(/[‘’]/g,"'")
        .replace(/[“”]/g,'"')
        .replace(/[–—]/g,'-')
        .trim();
      parsed = JSON.parse(clean);
    } catch(e) {
      // Si falla el parse, intentar extraer JSON con regex
      const match = raw.match(/\{[\s\S]*\}/);
      if (match) {
        try {
          parsed = JSON.parse(match[0]);
        } catch(e2) {
          showToast('Error al procesar — presiona Regenerar');
          if (btn) { btn.disabled = false; btn.innerHTML = stage ? stage.aiButton : 'Regenerar'; }
          return;
        }
      } else {
        showToast('Error al procesar — presiona Regenerar');
        if (btn) { btn.disabled = false; btn.innerHTML = stage ? stage.aiButton : 'Regenerar'; }
        return;
      }
    }
    juegoState.iaFragments[turno] = parsed.fragmento || '';
  } catch(e) {
    juegoState.iaFragments[turno] = 'La historia continúa en las sombras...';
    console.error(e);
  }

  juegoState.turno = turno + 1;
  if (juegoState.turno > 5) juegoState.storyComplete = true;
  if (!journeyData['historia']) journeyData['historia'] = {};
  journeyData['historia'].juegoState = juegoState;
  saveLocal();
  renderStage(currentStage);
};

// Override runAI for historia to use juego state
const _originalRunAI = window.runAI;
window.runAI = async (stageId) => {
  if (stageId !== 'historia') { return _originalRunAI(stageId); }

  if (!juegoState.storyComplete) { showToast('Completa los 5 turnos primero'); return; }

  const btn = document.getElementById('btn-ai-historia');
  const regen = document.getElementById('btn-regen-historia');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Generando mapa emocional...'; }

  const e1 = journeyData['producto'] || {};
  const e3 = journeyData['segmento_revelado'] || {};

  const storyContext = [
    `Turno 1 — Personaje (carta #${juegoState.cards[1]}): "${juegoState.metaphors[1]}"`,
    `Turno 2 — IA (carta #${juegoState.cards[2]}): "${juegoState.iaFragments[2]}"`,
    `Turno 3 — Obstáculo (carta #${juegoState.cards[3]}): "${juegoState.metaphors[3]}"`,
    `Turno 4 — IA (carta #${juegoState.cards[4]}): "${juegoState.iaFragments[4]}"`,
    `Turno 5 — Deseo Secreto (carta #${juegoState.cards[5]}): "${juegoState.metaphors[5]}"`,
  ].join('\n');

  const systemPrompt = 'Eres un estratega emocional especialista en SSP (Smart Serious Play).' +
    '\n\nUna historia colaborativa entre un emprendedor y la IA ha sido co-creada usando cartas SSP. A partir de esa historia debes extraer el mapa emocional del cliente del emprendedor.' +
    '\n\nContexto del negocio:' +
    '\n- Producto: ' + (e1.nombre||'') + ' — ' + (e1.descripcion||'') +
    '\n- Segmento revelado: ' + (e3.selectedSegmentText||'') +
    '\n\nHistoria co-creada:\n' + storyContext +
    '\n\nExtrae exactamente:' +
    '\n- 3 DOLORES (lo que carga, lo que pesa)' +
    '\n- 3 FRUSTRACIONES (lo que intenta y falla)' +
    '\n- 3 MIEDOS (lo que paraliza en silencio)' +
    '\n\nPara cada uno: insight (verdad no dicha) y accionador (accion/recurso/alianza concreta).' +
    '\n\nResponde SOLO con este JSON:' +
    '\n{"historia":"resumen poetico de la historia co-creada en 100 palabras","elementos":[{"tipo":"DOLOR","nombre":"nombre corto","descripcion":"descripcion empatica","insight":"verdad no dicha","accionador":"accion concreta"},{"tipo":"DOLOR","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"DOLOR","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"FRUSTRACION","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"FRUSTRACION","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"FRUSTRACION","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"MIEDO","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"MIEDO","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"MIEDO","nombre":"","descripcion":"","insight":"","accionador":""}]}';

  try {
    const resp = await fetch('https://anthropicproxy-z4dcljw5oa-uc.a.run.app', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 2000,
        system: systemPrompt,
        messages: [{role: 'user', content: 'Genera el mapa emocional completo de la historia.'}]
      })
    });
    const data = await resp.json();
    const raw = data.content?.[0]?.text || '{}';
    let parsed;
    try {
      const clean = raw
        .replace(/```json|```/g,'')
        .replace(/[‘’]/g,"'")
        .replace(/[“”]/g,'"')
        .replace(/[–—]/g,'-')
        .trim();
      parsed = JSON.parse(clean);
    } catch(e) {
      // Si falla el parse, intentar extraer JSON con regex
      const match = raw.match(/\{[\s\S]*\}/);
      if (match) {
        try {
          parsed = JSON.parse(match[0]);
        } catch(e2) {
          showToast('Error al procesar — presiona Regenerar');
          if (btn) { btn.disabled = false; btn.innerHTML = stage ? stage.aiButton : 'Regenerar'; }
          return;
        }
      } else {
        showToast('Error al procesar — presiona Regenerar');
        if (btn) { btn.disabled = false; btn.innerHTML = stage ? stage.aiButton : 'Regenerar'; }
        return;
      }
    }

    if (!journeyData['historia']) journeyData['historia'] = {};
    journeyData['historia'].aiResult = `📖 HISTORIA CO-CREADA\n\n${parsed.historia}`;
    journeyData['historia'].accionadores = parsed.elementos.map(e => ({
      tipo: e.tipo, nombre: e.nombre, insight: e.insight, accionador: e.accionador
    }));
    saveLocal();
    if (regen) regen.classList.add('visible');
    renderStage(currentStage);
  } catch(e) {
    showToast('Error al generar mapa emocional');
    console.error(e);
  }

  if (btn) { btn.disabled = false; btn.innerHTML = '✦ Generar Mapa Emocional Completo'; }
};

let historiaPhotos = {}; // {personaje: base64, mundo: base64, ...}

function renderHistoriaStage(saved) {
  const partes = HISTORIA_PARTES.map(p => {
    const hasFoto = saved['foto_' + p.id] || historiaPhotos[p.id];
    return `<div class="historia-parte">
      <div class="historia-parte-header">
        <span class="historia-parte-emoji">${p.emoji}</span>
        <span class="historia-parte-title">${p.title}</span>
      </div>
      <div class="historia-ejemplo">

      </div>
      <div class="historia-body">
        <div class="historia-foto-zone">
          <div class="historia-foto-upload ${hasFoto?'has-img':''}" id="hfoto-${p.id}">

              <span>📸</span>

window.historiaFotoChange = (event, parteId) => {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const b64full = ev.target.result;
    // Compress
    try {
      const img = new Image();
      await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = b64full; });
      const canvas = document.createElement('canvas');
      const scale = Math.min(1, 600 / Math.max(img.width, img.height));
      canvas.width = Math.floor(img.width * scale);
      canvas.height = Math.floor(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const compressed = canvas.toDataURL('image/jpeg', 0.6);
      historiaPhotos[parteId] = compressed.split(',')[1];
      // Update UI
      const zone = document.getElementById('hfoto-' + parteId);
      const imgEl = document.getElementById('hfoto-img-' + parteId);
      if (zone) zone.classList.add('has-img');
      if (imgEl) { imgEl.src = compressed; imgEl.style.display = 'block'; }
      if (!journeyData['historia']) journeyData['historia'] = {};
      journeyData['historia']['foto_' + parteId] = compressed;
      saveLocal();
      showToast('📸 Carta ' + parteId + ' guardada');
    } catch(e) { console.error(e); }
  };
  reader.readAsDataURL(file);
};

// Save historia text fields
function saveHistoriaTextos() {
  if (!journeyData['historia']) journeyData['historia'] = {};
  HISTORIA_PARTES.forEach(p => {
    const el = document.getElementById('htexto-' + p.id);
    if (el) journeyData['historia']['texto_' + p.id] = el.value.trim();
  });
}

// Override runAI for historia mode
const _origRunAI = window.runAI;
window.runAI = async (stageId) => {
  if (stageId !== 'historia') return _origRunAI(stageId);

  // Save current text
  saveHistoriaTextos();

  const btn = document.getElementById('btn-ai-historia');
  const regen = document.getElementById('btn-regen-historia');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Generando historia y mapa emocional...'; }

  const e1 = journeyData['producto'] || {};
  const e3 = journeyData['segmento_revelado'] || {};
  const h = journeyData['historia'] || {};

  // Build context from 5 partes
  const partesContext = HISTORIA_PARTES.map(p => {
    const texto = h['texto_' + p.id] || '';
    return p.emoji + ' ' + p.title + ': ' + texto;
  }).join('\n');

  const systemPrompt = [
    'Eres un escritor creativo y estratega emocional especialista en SSP (Smart Serious Play).',

    'TU TAREA TIENE DOS MOMENTOS:',
    'MOMENTO 1 - LA HISTORIA:',
    'Toma los elementos crudos del emprendedor y transformalos en una historia corta (150 palabras max), completamente fantasiosa, emotiva y metaforizada. Dale drama, tension y un destello de esperanza al final.',
    'MOMENTO 2 - MAPA EMOCIONAL:',
    'De esa historia extrae exactamente 3 dolores, 3 frustraciones y 3 miedos del cliente real.',
    'Para cada uno genera: insight (verdad no dicha) y accionador (accion/recurso/alianza concreta).',
    'Responde SOLO con este JSON exacto (sin texto adicional):',
    '{"historia":"texto completo de la historia","elementos":[{"tipo":"DOLOR","nombre":"nombre corto","descripcion":"descripcion empatica","insight":"verdad no dicha","accionador":"accion concreta"},{"tipo":"DOLOR","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"DOLOR","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"FRUSTRACION","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"FRUSTRACION","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"FRUSTRACION","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"MIEDO","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"MIEDO","nombre":"","descripcion":"","insight":"","accionador":""},{"tipo":"MIEDO","nombre":"","descripcion":"","insight":"","accionador":""}]}'
  ].join('\n\n');

    // Build user content with images
  const userContent = [];

  // Add images if available
  HISTORIA_PARTES.forEach(p => {
    const foto = historiaPhotos[p.id] || (h['foto_'+p.id]?.split(',')[1]);

      userContent.push({type:'image', source:{type:'base64', media_type:'image/jpeg', data:foto}});

  userContent.push({type:'text', text:'Estos son los elementos de mi historia y las fotos de las cartas SSP que elegí para cada parte. Genera la historia y el mapa emocional.'});

  try {
    const resp = await fetch('https://anthropicproxy-z4dcljw5oa-uc.a.run.app', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 2000,
        system: systemPrompt,
        messages: [{role: 'user', content: userContent}]
      })
    });

    if (!resp.ok) throw new Error('Error ' + resp.status);
    const data = await resp.json();
    const raw = data.content && data.content[0] ? data.content[0].text : '{}';
    let parsed;
    try {
      const clean = raw
        .replace(/```json|```/g,'')
        .replace(/[‘’]/g,"'")
        .replace(/[“”]/g,'"')
        .replace(/[–—]/g,'-')
        .trim();
      parsed = JSON.parse(clean);
    } catch(e) {
      // Si falla el parse, intentar extraer JSON con regex
      const match = raw.match(/\{[\s\S]*\}/);

        showToast('Error al procesar — presiona Regenerar');
        if (btn) { btn.disabled = false; btn.innerHTML = stage ? stage.aiButton : 'Regenerar'; }
        return;
      }

    if (!journeyData['historia']) journeyData['historia'] = {};
    journeyData['historia'].aiResult = 'HISTORIA\n\n' + parsed.historia;

  }

};

  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const b64full = ev.target.result;
    try {
      const img = new Image();
      await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = b64full; });
      const canvas = document.createElement('canvas');
      const scale = Math.min(1, 800 / Math.max(img.width, img.height));
      canvas.width = Math.floor(img.width * scale);
      canvas.height = Math.floor(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);

      if (zone) zone.classList.add('has-img');
      if (preview) { preview.src = compressed; preview.classList.add('visible'); }

      journeyData['modelo_causal'].matrizFoto = compressed;
      saveLocal();
      showToast('📸 Matriz guardada');
    } catch(e) { console.error(e); }
  };
  reader.readAsDataURL(file);
};

window.saveCausalStage = async () => {
  const ganador = document.getElementById('causal-ganador')?.value.trim();
  const propuesta = document.getElementById('causal-propuesta')?.value.trim();
  if (!ganador) { showToast('Escribe el accionador ganador'); return; }

  if (!journeyData['modelo_causal']) journeyData['modelo_causal'] = {};
  journeyData['modelo_causal'].ganador = ganador;
  journeyData['modelo_causal'].propuesta_variable = propuesta;
  journeyData['modelo_causal'].completed = true;
  journeyData['modelo_causal'].completedSummary = 'Accionador ganador: ' + ganador + '\n\nPropuesta de valor: ' + propuesta;

  document.getElementById('btn-next').disabled = false;
  renderSidebar();
  showToast('✓ Modelo causal guardado');
};
